body:
  text: 涅槃經玄義文句大涅槃經玄義卷上隋天台沙門灌頂撰釋題五義與法華玄義但是廣略之異用彼廣銷此略於義無失以二經同一味故就文為二一略釋經題五章深旨二從玄義下開章廣釋初為五一通明事理顯三德義二但衆生下明機教不同三皆能仁下明教主權實利物以得宜四今此大經下明說教時異五此經若具下略解經題初又二初正釋次此則下結法同譬初又二初標性德之理體次無始下解釋夫正道幽寂無始無終妙理虗玄非新非故初言夫者發語之端也正道明種智體幽寂明涅槃體妙理下辨體虗玄量同法界無明生死亦復如是次釋又二初通明事理次此經乃下今經事理初又二先釋始終次無明下釋新故無始而言其始者謂之無明生死無終而語其終者即是種智涅槃初言無始而言其始者約修以顯其性謂以智觀方識無明故云而言其始無終而終者約修成以故云而語其終是則種智涅槃名理無明生死屬事又修得種智涅槃為事性種智涅槃理也文意專依初一義以釋以無明下釋新故無明生死本自有之名之為故種智涅槃修因方克目之為新例爾次此經下正別明今經事理因果之相為四初釋依非始終而立始終以顯因果之相此經乃於非始之始分別佛性三因之殊還就無終之終辨於涅槃三德極果之別言殊別者筆語從便其義一也二若佛性下釋因果體如顯新故若佛性之因非因涅槃之果非果是則因如不異果如果如不異因如若因如不異果如非止涅槃之如非新佛性之如亦復非新若果如不異因如非止佛性之如非故涅槃之如亦復非故三是則佛性下結歸不二是則佛性涅槃因果之如皆是非新非故四非新下結成修性非新非故之理即是法身非新而新之果即是摩訶般若既有非新而新種智之圓極則非故之故無明生死患纍究竟斯亡目之解脫亦云事理以顯三身三德之相爾今經旨趣次此則下結法同譬中此則三德之義宛然不縱不橫妙等伊字云不縱橫者謂因時三德不縱不橫果時亦爾法與譬令妙等但衆生下二明機教不同中但衆生利鈍不同是以大聖赴緣之教亦有頓漸之別頓則譬於忍辱之草牛食即得醍醐漸則五味階級次第圓滿或有不定根緣為赴此機所說教門非頓非漸喻之置毒於乳也言或有不定者只不定一言兼於顯露祕密二不定義又云非頓非漸者以不定教不專頓漸故著雙非之言皆是能忍下三明教主得宜中皆是能忍妙窮權實巧赴根緣化他利物罄無乖爽云妙窮權實者謂即實而權即權而實故能巧赴逗物所宜爽者今此大經下四明說教時異於中二初述所為意今此大經為欲開通往昔教門顯發如來方便密義故於娑羅雙樹大師子吼次師子下釋相師子吼者名決定說決定說者說一切衆生悉有佛性如來畢竟不入涅槃不入涅槃即是入於無上大乘大般涅槃皆可見此經若具下五略解經題又二先正釋次若具下重釋以顯題旨初文二初標二音此經若具依梵本應云摩訶般涅槃那修多羅摩訶言大般涅槃那此翻滅度次釋又二先正釋次修多羅下指廣釋中又二初標列釋此三字具依兩義一別二通次釋又二先釋次別通下結初又二先別次通初別中第一別釋者大即法身故此經云所言大者其性廣博猶若虗空其性即法性法性即法身也滅者即是解脫解脫二種煩惱生死永滅免斯因果患纍即解脫義也所言度者即是摩訶般若故大論云信為能入智為能度當知別以三字標今經之目即是三德之異名也云信為能入者由有大信能入佛法則令大智能度三惑二死之此岸至三德涅槃之彼岸第二通釋大者謂大法身大般若大解脫也滅者即是三德皆寂滅也度者即是三德皆究竟圓滿也故通以三字標名表三德皆大寂滅究竟也別通之義雖殊然竝是用非果之果無上祕密之極果以標一教之首也次指廣中修多羅即是聖教之總名有翻無翻事在別釋事在別釋者如下四句釋又如法華玄義卷第八廣釋次若具下重釋中為三先標次大若下正釋三義三總攬下離三法以對五章標極教首若具依梵本應言摩訶般涅槃那今翻為大滅度初如文次正釋文自為三大若虗空不因小相又其性廣博多所容受又名不可思議諸佛之法界是為三義釋大也初若虗空者即般若畢竟空又其性下即解脫又名不可下即法身是則一名之下皆具三義次滅中滅者滅二十五有及虗僞物又得二十五三昧種種示現又生滅滅已寂滅為樂是為三義釋滅也初云滅二十五有者即畢竟空虗即假名物即實法內外假實皆忘方名畢竟空又得下解脫又滅生下法身滅生滅滅已即真諦涅槃忘寂滅為樂即中道涅槃體本法界亦不可得三明度中度者度於不度又度於度又度此彼之彼岸亦度非彼非此之彼岸譬如神龜水陸俱度是為三義釋度也先法次譬法中云度於不度者般若也三惑二死不度之者而皆度之又度於下解脫也入空出假悉令安置解脫法中又度此彼下法身也生死為此真諦為彼中道體顯任運亡照故云亦度等三對五章者總攬三法三目三點名大般涅槃金剛寶藏滿足無缺不縱不橫不竝不別微妙祕密以當其體常住不變恆安清凉不老不死以當其宗置毒佛性遍五味中味味殺人震大毒鼓雖無心欲聞聞之皆死八大自在我以當其用常住二字無上醍醐與諸典別決定之吼以當其教名含體攝常宗毒用極教之相也初對釋名金剛下對體皆可解對宗中云常即常德恆安即樂德清凉即淨德不老等即我德初後常觀四德行道自因之果故云以當其宗用等可知極教之相者若非圓常極教無此毒用宗則非常體不遍攝諸法名豈含於三德祕藏澤明云釋此經略為六門一明說經意二明經宗旨三明體性四釋經時代五釋經題六釋經文初門分二一總明說經意寶法師云諸經中說諸佛菩薩發心願行皆為欲令一切衆生當得成佛今經亦爾一切菩薩信衆生悉有佛性當得成佛二別明說經意等如彼廣釋不具記玄義下次開章廣釋文為二初標列玄義開為五重一釋名二釋體三釋宗四釋用五釋教次解釋於中大文自為章初釋名文為二先標列釋名又五謂翻通無假絶二解釋於中又二初正釋次總結下結歸圓極四門絶言之教初正釋文自為五初翻名又二先明正翻次釋其義下釋名下之義初又二先標列翻者四說謂無有亦有亦無非有非無次初言下解釋為三初示五竺輕重不同次如言下正辨不同相三其各下敘舊初言無者天竺五處不同東南中三方奢切小殊西北兩處大異初如文次不同中三初述彼類此次有人下岸謬三毗婆下引證以顯正義如言摩訶摩醯泥曰泥洹此則三方如言洹𨽻槃那般涅槃那此則二方類如此間楚夏耳初如文次岸謬中有人以泥曰目雙卷泥洹目六卷涅槃目大本是義皆不然雙卷明八十無常六卷明金剛不毀豈可以方言簡義云豈可至義者夫翻名從義豈可以方言能定邪三引毗婆娑者毗婆沙云涅槃那今經無那字蓋譯人存略耳肇論以摩訶涅槃為彼土正音古今承用十住毗婆沙也三敘舊中二初文自為四句次出開善四釋初又二先出四句以示相次今明漢人下今家略非以顯正翻初文自四初明無翻又二先標其各說者凡有五家次一廣下列釋五家一廣州大亮云一名含衆名譯家所以不翻正在此也名下之義可作異釋如言大者莫先為義一切諸法莫先於此又大常也又大是神通之極號常樂之都名故不可翻也二云名字是色聲之法不可一名纍書衆名一義疊說衆義所以不可翻也三云名是義上之名義是名下之義名既是一義豈可多但一名而多訓例如此間息字或訓子息或訓長息或訓止住之息或訓暫時消息或訓報示消息若據一失諸故不可翻四云一名多義如先陀婆一名四實關涉處多不可翻也五云秖先陀婆一語隨時各用智臣善解契會王心涅槃亦爾初出言涅槃涅槃即生也將逝言涅槃涅槃即滅也但此無密語翻彼密義故言無翻也如文次有翻中二先引梁武例論可翻次明十家所說二云有翻者梁武云佛具四等隨其類音溥告衆生若不可翻此土便應隔化四等亦是不遍引釋論般若尊重智慧輕薄既得以輕代重何得不以真丹單別翻天竺兼含初梁武意者涅槃若不可翻此土則無法可以施化佛教唯被西土故云便應隔化四等亦是不遍謂慈悲喜捨諸經皆翻名若例涅槃不可翻者義亦不遍此土次明十家又三先標意既可得翻且舉十家次一竺下列釋一竺道生時人呼為涅槃聖翻為滅引文云聞佛唱滅悲哀請住魔王所以勸令速滅云云二莊嚴大斌翻為寂滅引文云生滅滅已寂滅為樂前家止滅於生後家滅生復滅於滅故言寂滅云云三白馬愛翻為祕藏引文云皆悉安住祕密藏中云云四長干影翻為安樂引文云如人病差名為安樂安樂名涅槃五定林柔翻為無纍解脫既無創疣即無纍也六太昌宗翻為解脫引四相品云涅槃名解脫迦葉品云慈悲即真解脫解脫即大涅槃七梁武翻為不生引文云斷煩惱者不名涅槃不生煩惱乃名涅槃八肇論云無為亦云滅度九會稽基偏用無為一義為翻也十開善光宅同用滅度引文云大覺世尊將欲涅槃引六卷云大牟尼尊今當滅度彼此兩存正是翻也三例大下例結例大本稱娑羅雙樹六卷云堅固林又引法華長行云中夜當入涅槃後偈云佛此夜滅度又引華嚴云古來今佛無般涅槃除化衆生方便滅度又引遺教佛臨涅槃略說教誡又云時將欲過我欲滅度是為十家明有翻也竝如文斌府巾反文質也三明亦可翻亦不可翻者睿師云秦言謬者定之以方冊梵音不可變者即而書之匠者之公謹受者之重慎今經翻摩訶為大般涅槃三字存梵音是則一字可翻三字不可翻梵漢雙題正應在此四云大名不可思議故非可翻非不可翻三四二句竝可解今明下次略非以顯正義今明漢人多不曉梵即有衆說莫知孰是世既咸用開善未能異之今雖同其翻不用其義同翻者摩訶此翻為大般涅此翻為滅槃那此翻為度是為大滅度也有翻無翻四家竟可解次開善為三先述彼四釋次觀師難三今師一一難破次出開善四解一云滅據法度據人生死之法滅已還無生死之人轉而作佛二云滅名目無滅有還無故度名目有從此至彼故實法道邊人法俱滅相續道中人法俱度三云滅是有餘度是無餘有餘涅槃既未究竟止可是滅無餘永免方得是度四云滅是本有今無之義而加之以度者是永免之名欲明凡夫之死亦得是滅而非永免不得稱度初言實道者果地法也相續道者謂修因向果時人法俱度如此因果令是觀師難初解云若生死之法滅無生死之人附何而度若生死假人轉得成佛生死之法何不轉為涅槃三今研者於彼一一解皆約四教破之尚不成藏等三教之義何況得成圓教菩薩義邪於中為二先示四番研相次若具下結意初番為二先研不成四教菩薩義今研初解是何等義若依聲聞法者三果生死未併滅假人不永度若第四果凡法因雖滅凡法果未滅假人猶未度若灰身滅智假法俱寂寂則不論度又不得作佛若菩薩法者凡法都不滅假人又不度是誰法滅何等人度如此往推非三藏義也若依聲聞菩薩共法者三乘之人同以無言說道斷煩惱入第一義即體生死法是涅槃法不論滅與不滅即生死人是涅槃人不論度與不度既無法可滅何用以滅目之既無人可度用度目誰如此推之則非通教義也若獨菩薩法非但滅生死之訛法亦滅涅槃之真法非但度生死之凡人亦度出世之聖人彼師言不涉真法語不論聖人以此往推非別教義也若就佛法者滅之與度不縱不橫無二無別彼師分滅異度離法論人如此往推非圓教義也次既非下結非既非小非共非菩薩非佛竝非先聖之法言不敢道也云云竝如文次研第二解為二先案三權一實研次既非下結非釋失今研第二解若以滅目無以度目有者若受此有無猶是苦諦執此有無猶是集諦修此有無猶是道諦盡此有無猶是滅諦滅諦之真尚不可以有無名之云何以有無名大涅槃如此往推非三藏真義若以滅目無以度目有若雙目生死生死本自不然今則無滅生死既無滅以滅目誰生死本自不然那得是有非有則無度法亦無度者度復目誰既不可以滅度目於生死云何以滅度目於涅槃疆以疣贅纍彼虗空以此推之非是聲聞菩薩共法初二如文三明別教中三初約名法研若以滅目無以度目有者此以名召法以法應名名物尚字為見所縛云何以見義釋大涅槃二約二門研若以滅目無門以度目有門者為目小門為目大門小門能通拙所通訛貧住化城久已被棄云何以拙能通釋大涅槃三約真俗若以滅目無以度目有明真俗二諦者此是偏邪二邊云何以二邊釋中道大涅槃如此往推則非菩薩法也四約圓教若以滅目無以度目有有不關無無不關有滅非是度度異於滅縱橫狼藉劫掠群牛不解鑽搖醬猶難得況酥醍醐如此往推則非佛法既非小乘非共乘非菩薩乘非佛乘是何等義邪云云研第三解今研第三解若有餘涅槃既未究竟止可是滅無餘永免方得稱度者亦應滅度四住非是究竟滅度塵沙方得稱度又滅度塵沙亦非究竟滅度無明方得稱度又滅度無明亦非究竟滅度究竟滅度方得稱度以後望前前非究竟第二第三亦非究竟何得以初番滅度釋大涅槃云云唯約別教漸次以破研第四解今研第四解凡夫已有還無得是滅亦應凡夫從此至彼便應是度若凡夫非度凡夫亦復非滅若聖人已有還無亦得是滅聖人從此至彼復應是度若凡聖俱度俱滅若為論異若同凡聖則近狹非高廣若異凡聖亦非高廣非高故則非無上非廣故則有邊涯云何以此釋大涅槃專約圓教融即以破次結中若具研四解應作四四十六番今但十番而已餘皆可知明哲自解何俟多言時人以開善為長故薳研之餘人置而不言耳翻名已如前說云但十番者第三約別教第四約圓并前第一第二各四但成十番第二釋義為二初釋三義次今依下簡示今經涅槃初文自三就釋大義為四初標列次釋論下引證釋成三今言下正釋四於一下結成祕藏釋其大義者大有三義一理大二智大三用大初云理大智大用大者此與法華十妙名略而義同者理智二大當彼自行因果五妙用大當彼化他能所五妙又彼妙即是此大家之妙此大即是彼妙家之以義同故次引論者釋論謂大多勝大取包廣多取含攝勝取秀出大多勝三與彼對義小異彼以勝對法身大對報身多對應身體同對異以義通故三釋中今言法身法界遍一切處是廣大義報身智境照發相應不可窮盡是含攝義應身自在無能遏絶是勝出義云胎藏相應者謂智照境境發智故云相應應身自在等者機興則應機息則滅無方大用彌輪法界無能遮止於一大字三法具足不縱不橫不可思議名祕密藏祕密藏者即大涅槃二滅為四初標列次性滅下正釋三如是下結成顯大涅槃四於一滅下結法同譬釋般涅為滅滅有三義謂性滅圓滅方便滅初如文次釋中性滅者理性至寂非生非起生起不能喧動故名性滅圓滅者照無不遍發無不足明窮境極故名圓滅方便滅者權巧妙能逗必會取必克故名方便滅云理性至寂者此約契於極果滿以說故云至寂非生非起者從因契果為生理顯名起只是性滅生不能喧起不能動故云非也發無不足者此明境發於智由境發智智無不圓故云足也明窮下釋智境照發之相逗必會者稱適機宜故取必剋三密引之無不入實如是三滅即三解脫無縛無脫是性淨解脫因果畢竟是圓淨解脫巧順機宜無染無纍是方便淨解脫於一滅字三脫具足不縱不橫不可思議故名三點三點者即大涅槃三釋槃那為四先標列次正釋三如此下結歸四於一度下結法同譬釋槃那為度度有三義謂實相究竟度智究竟度事究竟度初槃那者亦名息息有三義一息生死有為因果趣入無為名息二修行契實名息下文云若能斷除三十七品所行之事是名涅槃三息化歸真名息次釋中實相度者諸佛之師也非此非彼亦非中流非能非所無始無終故名實相度佛師度故諸佛亦度論云智度大道佛善來智度大海佛窮底即其義也智度者如如智稱如如境函大蓋大照發相應故名智度論云智度相義佛無閡即其義也事度者自度度他彼我利益無不究竟慈悲誓願一切周悉故名事度云非能非所二乘及三菩薩能也非所者非兩二乘及三菩薩所度涅槃也次智度者有三先法次函下譬顯三照發下合言智度相義者謂如法相解也如此三度即三般若實相般若是一切種智與諸佛同體觀照般若即一切智與諸佛同意文字般若即道種智與諸佛同事四結中於一度字三智具足不縱不橫不可思議故名面上三目三目者即大涅槃云面上三目者智是能照目能見故用譬之今作下次簡示中二先簡次第不融非今經意今作三番九義淺深別異各各不同者雖復多含攝勝未是今經正意文云法身亦非那可單作三身釋大文云解脫亦非那可單作三脫釋滅文云般若亦非那可單作三智釋度故知單釋非今經意次今經意下明今經三法互融成大涅槃又二先明九法互融成大涅槃意者文云三法具足名大般涅槃三法即三智三智即三點三法即九法九法即三法三法即九法是不縱九法即三法是不橫不竝不別亦復如是不三而三不一而一所以名祕密藏攝一切法悉入其中是諸佛體是諸佛師都名總號乃為具足稱大涅槃意在此耳次一智下結法同譬顯大涅槃一智三智三智一智所以名一面三目涅槃亦耳一脫三脫三脫一脫所以名伊字三點涅槃亦爾體意及事不得相離不得相混不可言言不可思思故名大涅槃皆可見二釋通名為二先釋次料簡初又二先明通意二釋通名者涅槃之名遍布諸處安樂一意亘十法界皆稱安樂次梵行下別經示相為五先引經以示通相次達磨下別同三若依下判四若擘下斥有餘義不成五又若下斥通義不可依初示中梵行品云寒地獄中若遇熱風以之為樂熱地獄中若遇寒風以之為樂如是安樂亦名涅槃獼猴得酒則能起舞騰枝躍樹秋水卒至河伯欣然魚鱉噞喁噴沫戲沼如是安樂亦名涅槃餓鬼飢渴得水食飽滿則得安樂如是安樂亦名涅槃修羅怖畏得歸依處則得安樂如是安樂亦名涅槃如貧得藏如病得差則得安樂如是安樂亦名涅槃檀提婆羅門飽食撫腹我今此身即是涅槃此計欲界果報法為涅槃阿羅羅仙得無想定此計色界法為涅槃頭藍弗得非想定此計無色界法為涅槃文云斷欲界結則得安樂乃至斷無色界結則得安樂如是安樂亦名涅槃此多用善因為涅槃也若三十三天常樂我淨用善果為涅槃也若修二乘者多貪欲人得不淨觀則得安樂如是安樂亦名涅槃乃至數息慈心念佛因緣亦如是此計二乘方便法為涅槃也若斷三界煩惱八萬六萬四萬二萬一萬住處則得安樂如是安樂亦名涅槃此計二乘果法為涅槃也釋論云菩薩從初發心常觀涅槃行道初心菩薩亦名涅槃此文云十住菩薩雖見不了了亦名涅槃諸佛法王聖主住處乃得名為大般涅槃也涅槃之名隨情逐事浩蕩若此蓋是通名也噴普悶反吐氣也文云多用善因者謂因於現善而得於樂名為善因又三十三天用善果者三十三天有不死甘露君臣共服譬常樂我淨此則用於十五果法為涅槃也次引同中三先引經釋相次二乘下判屬三昔滅下結昔非顯今是達磨多羅此翻法勝解云煩惱滅名有餘涅槃引經云滅諸煩惱名為涅槃離於生死名無餘涅槃引經云離諸有者乃名涅槃此就所滅釋二種涅槃也初如文次判中二乘所得二涅槃若於如來皆是有餘唯佛乃是無餘引勝鬘云二乘是有餘如來是無餘云二乘是有餘者未斷變易故三結昔非顯今是昔滅是盡今滅非盡經云不應生滅盡想涅槃非滅非滅故常也昔滅是盡者明真諦涅槃是有盡法以未見中故若依多之解乃是通涅槃今昔相對一途之說四斥中若擘肌分理義則不然何者二乘有餘無餘所滅則異真諦則同若於如來皆是有餘唯佛是無餘者若爾二乘既是有餘涅槃子縛斷破無明入菩薩位見佛性生死身謝即應同佛入無餘涅槃何事被訶言非不斷煩惱不到彼岸破除草庵若此等皆無分者云何對佛是有餘涅槃云肌者彼也斥意者若分別有餘無餘涅槃無為之理隨教不同義皆有在不同古人一槩判之大小無歸故云不然言所滅則異者滅子縛得有餘滅果縛得無餘又聲聞觀四諦以滅子果二縛支佛觀十二因緣以滅子果二縛又聲聞但滅正使支佛兼滅少習故云所滅異也若爾二乘至見佛性者難意者佛及二乘有餘無餘各別何得相望釋之又若二乘有餘無餘對佛而得是有餘涅槃者自地獄以上至菩薩已還例應如此若諸涅槃皆不可得然二乘安是故知多羅之說不可依也次料簡中二先問問安樂之名通十法界佛性四德名復云何次答於中三一答佛性通二答四德通三然名下示須三番四句料簡答經云一切諸法中悉有安樂性一切衆生悉有佛性豈非佛性通邪初如文次四德通中文云二十五有有我不邪答言有我寱言刀刀又楊樹黃葉等豈非四德通邪云二十五有有我不邪者具足應云有我樂淨常不邪寱言刀刀者外計邪常等四也楊樹譬妄常黃葉譬妄淨木牛馬譬妄樂木男女譬妄我故云等也三四句料簡中四初明名義通故須三四料簡次釋三前一下結三番爾齊四問如此下正料簡然名乃該通義不得混應作三番四句料簡初如文次正釋自為二先標列四句初四句謂通別亦通亦別非通非別次通下釋文自為四初通通者如向說如向前六道二十五有皆通有涅槃是次別別者各有所以六道以安身適性為安樂猶起煩惱惡因招生死苦果安樂義不成要斷煩惱使苦樂不復隨身憂喜不復隨心得有餘無餘灰身滅智隔別生死入于涅槃者則與六道別也可見三兩亦句中菩薩從初心為一切衆生觀涅槃行道望二乘是別望佛猶通即是亦通亦別也云望佛由通者由與小共復屬通途未階究竟大涅槃故名為亦通四兩非句中諸佛究竟大般涅槃非六道之通非二乘之別即非通非別之安樂也亦應云非方便教菩薩之別又無者略又安樂下第二番為二先標列又安樂之名或是病非藥或是藥非病或亦藥亦病或非病非藥次釋自為四句是病者長者沒已劫掠群牛𤚲乳自食漿酪醍醐一切皆失如來去後鈔竊正法常樂之名如蟲食木偶得成字不識是非廣起顛倒沈淪生死隨其流處有種種名或辛或酸故知三界四倒但是病而非藥為治此病說四非常倒瀉此病病去惑盡名入涅槃文云三種病中無三種藥三種藥中無三種病此小涅槃但藥而非病雖復病去而藥不亡還執此藥而復成病文云其後不久王復得病當知四非常亦藥亦病也初二三句可見第四句又二先明以小斥劣治此病故還用常樂我淨而倒瀉之故斥無常病說於新伊是勝三修不同凡夫之倒病不同二乘之偏藥故名非藥非病次又新下重釋又新伊但是藥而非病正法正性非藥非病之安樂也竝如文又小而下第三番亦二先列句又小而非大大而非小亦小亦大非小非大次釋自為四初小小者二乘也雖斷煩惱猶有習氣我身我衣我去我來謂佛與己等唯有常淨無有我樂三寶差別則是習氣所以為小也如文大句中云何名大諸佛如來竪出九界橫收一切無邊底故常大丈夫故常能化度一切故常不可思議故常具八自在故我斷苦樂故樂大寂故樂一切知故樂身常故樂有大淨故業淨身淨心淨是故名為大涅槃云無邊底者表橫竪不二三兩亦句菩薩望下為亦大望上為亦小可見四兩非句凡夫六道不斷通惑故非小無四德故非大例前應就理為非小非大互顯令易解耳為二先釋次例竝可見前一番從地獄已上料揀次一番從外道已上料揀次一番從二乘已上料揀四正料簡中二先問問如此料揀六道二乘既非安樂何故強說為涅槃邪次答答通有四悉檀因緣故則作通說云何更別問邪所以作通說者為悅衆生故引導生善故破壞諸惡故顯昔第一義故通說無咎又佛常依三諦說法依俗故說六道安樂依真故說二乘安樂依中故說佛菩薩安樂又不離俗而有真中尚得即俗即真即中何意不得六道說通安樂是涅槃邪龍樹云因緣所生法即空即假即中是其義也為五初正答有四悉因緣故須通說次所以下別示四悉益相三又佛下明佛說必依諦故須通四又不離下明達俗即真中故須通五龍樹下引證言因緣所生法者六道法也即空者六道有二乘法也即假者六道有菩薩法也即中者六道有佛法也故云何意不得六道為涅槃邪三釋無名為三先敘舊次初家下破三今言下正釋初為二先標三釋無名者先出舊解次釋一云真如實際等是真諦名佛果涅槃常樂我淨等是俗諦名而言涅槃無名者無生死患纍之名而有美妙之名也引互無為證涅槃無生死之名生死無涅槃之名耳二云真諦涅槃俱無名無相名相所不及言語道斷心行處滅引肇論江河競注而不流日月歷天而不周豈有名於其間哉三云真諦無名佛果涅槃雖復冥真猶是續待二假故涅槃不得無名也又自有於真善妙有之名然古人皆約所無以釋涅槃無名次家名相所不及者謂言語道斷故名所不及心行處滅故相所不及又引肇論有四句謂旋嵐嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天不周此四句是彼物不遷論文彼明俗諦三世無來去今用衍門初義釋者應云江河競注謂俗諦而不流謂俗如幻如化餘三句例爾正當今文約有即空無生真諦明矣第三家云猶是續待二假者由因滅果即相續假佛果涅槃異菩薩所得即竪待唯佛得之衆生未得即橫待因成是所破故不說之次破中三先騰執次若定下破三然三藏下結判初家真俗俱有名第二家真俗俱無名第三家真無名俗有名應更有第四家執真有名俗無名未見執者初如文次破中二先破墮倒以能為所故若定執此墮四倒見若以四為方便正是三藏四門次何者下釋文自有四初文為二先判墮小有何者若引互無有美妙之名者斷奠是三藏有門次能通下釋能通是有所通是非有何得用小乘能通釋大涅槃所通指荒塗為寶所認魚目是明珠大無所以於中云指三途為寶所者若以二乘能通釋大涅槃狀當指三途為寶所等若言真諦涅槃皆無名者秖是三藏空門若言真諦無名佛果涅槃猶是續待二假者秖是三藏亦有亦無門復應有計非有非無門者未見其人也二三四門可解三結判中文為四初判失次縱令下約教縱之三將此下結非四問答釋疑然三藏涅槃既非數法尚不是一何得有四四者能通之門耳不可以能通為所通初如文次縱中縱令跨節是通教四門者亦不可以通教能通為通教所通何得以共能通釋別所通又跨節為別教能通者亦不得以別能通為別所通那得以別能通釋圓所通云跨節者只是越藏用通等三結非中將此望之節節無意窈然大遠故不用此無名釋大涅槃云云云杳然大遠者去大涅槃途遠也四釋疑為二先問次答問古來傳譯什師命世升堂入室一肇而已肇作涅槃無名論其詞虗豁洋洋滿耳世人玩味卷不釋手意復云何初問意者論與前諸意復云何邪次答為六先謙恭以示旨趣次其論下釋四句相三然其下示論元意四辨差下判其所屬五夫通下斥失執共能通而求別所終不得可六然綱下結非答高僧盛德日月在懷既不親承其門難見鑽仰遺文管窺而已觀其旨趣不出四句初云高僧者謂肇公也次釋相文因為四初有句中其論云有餘無餘涅槃者良是出處之異號應物之假名若無聖人知無者誰若無聖人誰與道遊即其有句也其論有餘無餘者只緣云有餘無餘涅槃則成通義何以不云三德涅槃又良是出處者出是有餘處是無餘也次無次無句中寂寥虗豁不可以形名得微妙無相不可以有心知豈有名於其間哉即其無句也云不可以形名得者謂不可以身說得也三兩亦句中果有其所以不有故不可得而有有其所以不無故不可得而無耳恍忽窈冥其中有精本之有境則五陰永滅推之無鄉則幽靈不竭即其亦有亦無句也云果有其所以者皆以上句證無故云所以不有下句證有故云不可得而有又恍忽窈冥無也其中有精亦有也本有下例爾四雙非句中然則有無絶於內稱謂淪於外視聽之所不暨四空之所昏昧而欲以有無題榜標其方域者不亦邈哉即其非有非無句也論者沒也暨其果反及也亦居未反縣名在會稽四空者只是四句皆忌耳邈者遠也三爾無意意在共乘然其作論談大意不在小不可謂是三藏四句也文云超度有流言不涉界外之流大患永滅不滅涅槃之患故不可謂是別圓四句也四判其所屬辨差中云三車出於火宅俱出生死無為一也此以三三於無非無有三如來結習都盡聲聞結盡習不盡盡者去尺無尺去寸無寸修短在於尺寸不在無也智鑒有淺深德行有厚薄雖俱至彼岸而升降不同彼岸豈異異自我耳以此推之歸宗指極在於三人同以無言說道斷煩惱入涅槃文義孱然何可隱諱故知是通教四句也論中有辨差十演也此以三三於無者意云能無則有三乘所無唯一真諦去尺等者積寸以成尺故去尺無寸如結習都盡也五斥失中夫通教詮理非有非數而以有無四句為通道之門若執門求所通其失一也叉通教體法之觀非如來本懷隨自意語乃是俯提枝末隨他意語故嬰兒行云不知苦樂晝夜親疏等相不能造作大小諸事名曰嬰兒不知苦樂是泯憂喜不知晝夜是齊明暗不知親疏是等憎愛不作大小是亡巨細三人同學體觀喻之以嬰兒俱證無為喻之以入水論其智德喻之以三獸論其斷德喻之以灰斷宗在他經要非此典那忽將彼釋此其失二也又法華教起已破化城一切諸菩薩疑網悉已除千二百羅漢悉亦當作佛佛開通教方便之門示真實相云何追欣三獸更建草菴其失三也又聾瞶之徒不在法華席者於哀歎品中更為分別汝先所修悉是顛倒我先所說亦非實語斥故顯新指劣明勝云何違經波動水浪握捉瓦礫持作月形其失四也文自為四初失如文次失中云俯者就下也提者誘也如嬰兒失故鄉俯提弱喪即其事也第三失如文第四失中齪測角反不齊也六結非者然綱維既闕網目安寄執佛法之遺棄謂是真實徒施於十演終非三德明矣若開權顯實示圓常佛性即今經綱維如彼所釋但是綱維之外網目而已故云安寄等十演者論有十演九折三正釋文為六初標意次無名下明今涅槃從所離得名三無如是下示圓四門從所得以顯體四無名之下結開權顯實明今經圓常涅槃故云超度等五諸師下斤失六梵行下引文以顯今經涅槃無名今言涅槃無名涅槃者指三德涅槃也無名者無六道安樂之名也又無三藏有門見有得道獲有餘無餘涅槃之名亦無見空得道亦無亦空亦有得道亦無非空非有得道獲有餘無餘涅槃之名也又無三乘共行十地有門得道獲有餘無餘涅槃之名也亦無空門亦空亦有門非空非有門得道獲有餘無餘涅槃之名也又無別教有門得道常住涅槃之名也亦無空門亦空亦有門非空非有門得道獲常住涅槃之名也初二如文三示圓門中無如是等諸方便之名從所離故故言無名從所得故故言涅槃此即圓教有門之意也又非離諸名外別一涅槃即諸名無名便是涅槃故言涅槃無名此圓教空門意也又從所離故故言無名從能離故故言涅槃能所合稱故言涅槃無名此圓教亦空亦有門意也若有能所則大有名何謂無名今無能所稱為涅槃無名此是圓教非有非無門意也門雖有四涅槃非四也云云初有門約相待釋次空門約開權絶待釋兩亦門約雙用釋雙非門約雙非第三以顯第四門相無名之意超度爾許諸涅槃名然後乃顯圓當四門大般涅槃諸師都未嘗分別一兩節目即道無名無何等名名曰無名疑誤後生今所不用也故梵行品云無緣慈者不緣衆生亦不緣法緣於如來故名無緣今亦例此無六道之名無四聖之名而有祕藏涅槃之名故言涅槃無名也第四釋假名文為七初引德王徵責為立名之由次加葉下明為緣假設三智度下引同四亦如下舉例釋成五是大涅槃下明今經三假相六當知下結前諸意七大論下引同四釋假名者德王初云涅槃非名非相云何而言可得見聞不可見故無相不可聞故無名佛以佛眼佛耳尚不見聞況復下地及與凡夫而能見聞大悲方便動樹訓風舉扇喻月能令機緣而得見聞其見聞者實無見聞而言見聞初又二先引經明無次大悲下釋得名之意次迦葉下明假設迦葉品云涅槃一名有無量名亦名無生無出乃至亦名甘露亦名吉祥凡列二十五種示其無量悉為衆生而假施設文云如坻羅婆夷名為食油實不食油無有因緣強為立名名為食油如經廣說涅槃亦爾無有因緣強為立名名為涅槃又二亦先引經立意次文云下明為緣強立引物入實智度云名假施設受假施設法假施設實非色心而言色心是法假施設於色心上更設五陰十二入十八界等是受假施設於陰入界上更立張王李趙等是名假施設亦如攬色香味觸是法假施設於四微上更作根莖枝葉等是受假施設根莖之上更立楓柟柿柏等名是名假施設五明今經三假是大涅槃亦復如是強指此實法名為佛師是佛祕藏是法假施設於佛師上更復分別法身般若解脫三點是受假施設於三點上更立名字大般涅槃是名假施設或復呼為洲渚窟宅或復呼為乳麋妙味或復呼為醍醐上藥或復呼為一闡提或復呼為一破戒明鏡譬說虗空不可得無障閡如是豈非名假施設又二先釋三假相次或復下出異名竝可解當知從地獄以上至佛已還皆言安樂者悉假名也七引同中二先引同大論云衆生無上者佛是法無上者涅槃是次所以下釋意於中為八一為令達俗悟二空理次涅槃下明涅槃體遍三智度下引論遣執達真四此經下明今經依不思議以三稱五但依名下明權引入實六涅槃亦爾下明新伊四悉以益物七假立有下餘三名例八應說下結意所以設此假名者欲令衆生知名非名名不在內亦不在外亦不在中間亦不常自有大品云菩薩菩薩但有字佛佛但有字是字不住亦不不住是字無所有故初又二先明性空次大品下明相空竝可解次文中涅槃亦爾涅槃不在法身文云法身亦非又涅槃不在般若文云般若亦非又涅槃不在解脫文云解脫亦非三德中各各求皆不可得三法合求亦不可得云三法中合求者以一德即三德故故智度云若人見般若是則為被縛若不見般若是亦為破縛若人見般若是為得解脫若不見般若是亦得解脫法身解脫亦如是譬如幻化物不可見而見見而不可見是事為希有此經名為微妙不可思議但假名字名此三身為祕密藏涅槃但假名字名此三般若為摩醯三目涅槃但假名字名三解脫名三點涅槃但假名字具足三法名大涅槃但假名字引導衆生譬如空拳為喜小兒為引小兒為止啼兒為教黠兒其事辦已散指舒拳拳無拳矣涅槃亦爾以新伊悅之以新伊引進之以新伊破之以新伊悟之是為假名四種利益得利益已寧復執名而起諍乎假立有名既爾假立無名假立亦有亦無名假立非有非無名亦如是云云八結意者應說將跨來因緣云云又如治噎法云云應知當分跨節開權無非假名因緣引物人實如治噎法者只是假想耳五釋絶名為二先正次今以下料簡初又二先述他解次將此下約教斥偏五釋絶名者有人以無釋絶亡有而存無無則不絶非今所用有人以離釋絶言涅槃之中無有諸有此尚非小乘義亦所不用有人以滅釋絶言滅諸煩惱悉無所有猶如火滅存於涅槃者經稱是邪解邪難此豈可用邪有人引經云如大香象頓絶羈鎖自恣而去初云無有諸有者無二十五有因果也次文又二先非其偏將此釋絶者此乃三修比丘偏歎菩薩所絶一邊義未具足同上無名之意非今絶名也次若言下約教以示絶遍於中自有四教初藏教為四初非其待對非絶次若知心下明賢位修絶三若入見下明聖位發絶四指此下結絶意若言語相逐對無說有乃至對有無說非有非無等待對不息言則不絶若以心分別介爾動念心起想即癡心亦不絶心既不絶言那得絶初云心起想即癡者謂心有想即癡無想即泥洹心亦不絶者心為想因故若知心是攀緣三界攀緣三界生滅是無常苦空無我息此攀緣心無所得心絶故其言亦絶此乃修習言語道斷心行處滅非真絶也若入見諦苦忍明發世諦死時名生不生身子云我聞解脫之中無有言說亦是解脫之中無有分別此則真證言語道斷心行處滅蓋三藏絶意四結意中指此一絶凡絶幾許人法況復餘邪云凡絶幾許人法者謂三宗六宗外道小乘內外凡位人當教四門法及人空法空一切皆絶無不悉人真諦況復餘邪者況通別之絶非古人所知然入真下次明通教為二先斥藏梏然入真時絶出觀不絶何者真俗異故一絶一不絶待對宛然云何名絶次若能通下正釋於中二亦先明賢位修絶次若空下明聖位發絶若能道遠乎哉即事而真聖遠乎哉體之即神見色與盲等聞聲與響等其說法者無說無示其分別者無所分別無絶無不絶而名為絶此亦方便道中言語道斷心行處滅初云聖遠哉者謂道非遠觀五陰即真故體之即神者達心即理故若空慧相應入第一義豁然清淨無能絶無所絶無絶者無絶法此通教絶名意也此雖冥下三明別教為二亦先斥通所通非遠次正釋此雖冥真未冥中雖斷通未斷別淨名云結習未盡華則著身下文云無明未吐回轉日月如瘧病者對界內說界外想通惑對別惑是則不絶初云如瘧病者謂一日發一日不發已斷通惑如發未斷別惑如不發故以瘧病譬之次正釋中二先賢位修絶若能以大涅槃心修行五行具十功德是時一向專求大涅槃行無復界內之心無復界內之說如是方便亦名言語道斷心行處滅而未是冥中次若發下聖位證絶若發中道所得功德不與聲聞辟支佛共昔所不得而今得之昔所不絶而今絶之蓋是別教絶名意也即從向後修中入地證中不與聲聞等六者亦應云不與方便菩薩共然證絶下四明圓絶為二亦先斥別次正釋然證絶之時乃同圓極而修時梯隥江河回曲何者發心不能遍法界故法界外更有法故不名絶法拙行不能行一行是如來行如來行外更有行故不名絶行非無上方便方便上更有方便非絶方便初云江河回曲者謂先空次假後中故爾法界外有法者中外由有空假及圓融三諦法故次正釋中三先明賢位次若謂開下聖位證絶三然諸經下引同初又二先明開三教四門入圓次是圓下明圓四門絶觀初又五初引經立境若圓發心觀大涅槃諸心法界法界外更無復法界獨一法界故稱絶法界又如經復有一行是如來行如來行外更無復行故名獨絶行又如經正直捨方便但說無上道尼俱耶洲直入西海猶如直繩是絶方便次絶方便者下開藏入實絶方便絶者如經斷絶一切疑網心故名為解脫三藏四門即是法界即如來行即上方便何者生死即是涅槃況聲聞法生決定心寧起疑網三通下開入實通教四門亦即法界共乘疑網斷故四別下開別別教四門即是法界菩薩乘疑網斷故五是明下結意是名斷絶一切疑網之心名獨絶解脫唯說一法界不說餘法界唯思一法界不思餘法界是為方便道中言語道斷心行處滅次圓四門中是圓方便亦有四門若謂一切法絶是法界唯一法界此約有門絶名也若謂法界尚無法界寧有其餘此約空門絶名也若謂法界微妙一法即三法三法即一法此就亦有亦無門絶名也若謂法界不可思議此就非有非無門絶名也此皆方便道云一法即三法者謂三法宛然名亦有同一法界體無復三名亦無若謂開示悟入如以金鎞抉其眼膜二指三指了了分明是名究竟絶言言滿法界而無一言心滿法界而無一念是為圓教絶名意也三引同中四先引大部證絶然諸經絶名其旨非一華嚴云如執虗空風如畫虗空中說之已自難何況以示人淨名云諸法不相待一念不住故又諸菩薩言於言文殊言無言淨名杜口絶言次善吉下引小聖及菩薩論證絶言善吉云我無所說不覺不得龍樹云若法為待成是法還成待今則無因待亦無所成法今則無因得下正用此句證絶無也三今經下明今經絶待之大今經云譬如虗空不因小空名為大也涅槃亦爾不因小相名大涅槃云何小相從二乘所證乃至生死安樂皆是小相不因此小而名大也又云譬如有法不可稱量不可思議乃名為大涅槃亦爾不可稱量不可思議故名為大四當知下結正當知絶名涅槃其義顯矣斯文甚多逗緣亦異不可一槩次料簡中三先標列次云何下釋三云何絶絶下重釋絶今以四句料簡謂不絶絶非絶非不絶絶絶云何不絶如前六道安樂等云何為絶如三藏通共等云何非絶非不絶如引四門等云何絶絶圓四門是也初二如文三重釋中云何絶絶絶能絶所故言絶絶從別教四門以下名為所絶從圓教四門名為能絶以能絶絶所絶能絶亦絶如前火木然於草已亦復自然當知絶名與無名為異義在此也故言絶絶云能絶亦絶者今所絶是絶所即法界豈更有能故云能絶亦絶又亦復自然者始從觀行火木即與草木同然名觀行絶次總為五初標五重意次總結釋名一章開為五重都是圓教四門意也次若大涅槃下正釋若大涅槃名真善妙有本自有之非適今也此是有門義故作翻名同名釋之若大涅槃空迦毗羅城空此是空門義故作無名釋之若大涅槃亦色非色此是亦空亦有門義故作假名釋之若大涅槃名為中道遮二邊故此即非空非有門義故作絶名釋之三夫涅槃下辨異名夫大涅槃者尚非是一云何為四四者門也門以標理有種種名如天帝釋有千種名解脫亦爾多諸名字四名字下引證名字功德品云涅槃是名其餘稱歎是則為字五若爾下徵釋若爾涅槃是總而當機立之為名三點等及餘一切皆屬於字若法身當機是總已復為名涅槃及一切物已復屬字若爾更互無定雖復無定今既定以涅槃為名若定不定若總若別皆無待對悉是不可思議悉是大絶故名絶大涅槃也悉如文大章第二釋體為二先敘舊次今明下正釋初三初約二諦釋次古來下約三聖釋三古來復下約三性釋初又二先敘四家次有人下難第二釋涅槃體先出舊解莊嚴云佛果涅槃出二諦外非真俗攝凡夫以惑因感果是浮虗世諦假體即空故是真諦佛果非惑因所感故非世諦不可復空故非真諦引仁王經云超度世諦第一義諦住第十一薩雲若地也開善云佛果涅槃還為二諦所攝體是續待二假故是世諦即此二假可空故是真諦佛果靈智亦復冥真也冶城秀云佛果涅槃非世諦是真諦微妙寂絶故云世諦死時名生不生龍光云佛果涅槃具相續相待二假即世諦乃即真之義而不冥真若冥真同頑境即無雲智故非真諦也初自為四初莊嚴又二先正釋次引仁王下引證如文餘二師竝可解四龍光中云頑境者二乘偏空名為頑境次難中為四初正難破次論云下引證隨非三肇意下判屬外計非正涅槃四經云下證同謬執有人難此四解若佛果出此二諦外即應非有為非無為汝義中那云佛果一向是無為若為二諦所攝佛果應是亦有為亦無為若佛果是真諦真諦不可說於衆生無用若佛果是俗諦佛果一向是有為此皆成論師說自相矛盾都不愜人情亦不稱肇論初云都不愜人情者尚不愜世人情何得稱聖法之論次墮非中論云不可形名得不可有心知言之失其真知之反其愚有之乖其性無之傷其軀云知之反其愚者只是反成其愚耳肇意推之墮在四見佛法邊外尚非小涅槃門況小涅槃體尚非小涅槃門體焉得是共別涅槃門體尚不是共別門體何得是大涅槃體耶經云是諸人等春陽之月乘船遊戲失琉璃寶即共人水競捉瓦石歡喜持出謂琉璃珠都非真寶是珠澄渟清淨故在水中猶如仰觀虗空月形超然獨遠非衆人所執亦非衆盲所觸三約三聚為三先正釋次有人下難三如是下結非古來復約三聚論涅槃體言佛地一向有心聚一向無無作聚色聚亦有亦無無粗色有妙色引經因滅是色獲得常色六卷云妙色湛然常安隱云云又一解色是頑閡不可研進故佛地無色無無作唯有靈智獨存經道色者能應為無窮之色又妙果顯現義說為非色引文願諸衆生滅一切色入於無色大般涅槃又分別兩界有色一界無色又四空無色者無粗色耳三界竝有色界外變易則無色六地已還身在分段故有色七地已上身在界外則無色又七地是兩國中間獨有光影色八地已上則無色又言金心猶有色故經言意生身者雖無一期壽命但有念念生滅名為變易故言意生身身者猶有色也唯佛地無復色耳無作者金剛已前皆有無作唯金心無心無無作也初文為五初正辨三聚有無次又一解下明無色唯心三又妙下引證四又分別下約所依分別有無五作下釋無作悉如文有人難此義若涅槃定有色應有長短質像須依食住處若定無色心無所依豈可有心而無色若色頑須離心是取相何意不離如是等釋皆是妄語猶如盲跛見佛亦盲跛王語諸臣我庫藏中無如是刀不須多難也大般涅槃經玄義卷上音釋斌悲巾切創疣創初良切與瘡同疣疑求切贅也睿俞芮切贅朱芮切疣贅瘤也薳羽委切瞼喁險疑檢切喁魚容切險喁魚口上見也噴沫噴鋪魂切吐也沫音末涎沫也寱研計切寐中有言也掠力灼切奪取也𤛗居候切取牛羊乳也窈伊鳥切深遠也邈墨角切遠也孱鉏山切瞶五怪切聾也柟柿柟如占切梅也柿鉏里切果木名羈居宜切繫也鎞邊迷切掠器也抉於穴切剔也膜未各切翳膜也愜詰叶切快也跛補火切足偏廢也
