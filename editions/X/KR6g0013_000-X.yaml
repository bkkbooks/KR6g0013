front:
  text: 大般涅槃經玄義文句會本序蓋聞大般涅槃之為教以續常住之命然苟血氣旺臟腑壯六氣之迭衝五味之交嬈適足以養其軀而奚命之須續也及其衰也風雨霧露外侵甘酸哀痛內傷治表肝脾乘陵補中寒熱增劇如欲排邪扶正氷玉留年非阿伽陀之玅靡能濟焉方夫佛日照高山平地而后當午無影之時法運赫盛尚奚憂慧命之不續也佛鑑叔末澆漓溷濁輒陷邪見公畜不淨辟之穀貴而賊侵其伶俜且病者乎急執悶絕小心徐引憔悴法身張之踽踽凉凉弛之莽莽蕩蕩當是之時面欲戒捉定愛服餌甘露以續慧命非扶律談常莫收功焉是教也接邪誘小從漸入頓又即無常而修於常邐迆參差畢會乎常帝網之珠千燈之光無微不具無物不融則塵芥神昆蟲靈小彌大邪彌正能令伶俜疾苦悉佩長生符是為最上阿伽陀要之莫非救衰世也章安惟念渴飲甘露入山泝江想盲思狗情之不已廣尋舊疏陰林席箭具嘗百苦始成玄疏其所以如此莫非救衰世也暹師覽叔季根薄才謭要賴此典而玄疏又幽不指之方其必泣岐所以文句以批大郤莫非救衰世也然句則屬無何有疏則被禪人莫糊有守篤大和尚者早浴王泉流嚴持瓔珞珠教觀該深述作極富視此疏如此慨歎莫已遂復舊雪冤分會精粹和尚雖寂繼志者多校讎益勤宋明和本無不勘契由疏及玄由玄及句亡羊是尋畢於橫川鷄足獲其寫本使予校會其為書也其閻浮河中金乎今及刊行敢告學人夫眾彥所以致力此典莫非救衰世也今也則衰運極矣伶俜疾苦接武聯袖而此玅良藥擣簁和合見在于茲矣乃不肯服夭傷慧命其於佛祖先達苦心如何哉寬政壬子春二月權僧正慈等謹序凡例原本玄義二卷文句一卷今會本亦二卷故玄義則卷際有標及上下目而文句則無今全仍其舊但昂低一字以分玄句耳會本乃予所私題焉古目錄云涅槃玄義文句一卷道暹撰而其文湮之久矣今幸得焉而讀之撰者必然雖然原本不列撰者今不敢署焉文句原本首標曰文句終乃曰抄今不敢改作玄義有明藏本有和藏本有機要本有寫古本四本校勘莫善明本故今一循明本其有異文格上標之曰和和藏本也曰要機要本也曰一寫古本也然但存是者可者而其必非者不復贅焉文句則今僅得一本葢古物也惜乎多添脫魚嚕而又無他本可以挍焉今竊附管窺於格上後之獲善本者請訂之昂一字者玄義也低一字者文句也以者科也然有科無釋別標則太𤨏者今乃入諸本文之後文句科語或前後具闕詳略或與釋文連而不可分劈別行則可分會則不可者葢作者不初有意於分會故也若從義而次比文則不帖然乃今一循原文一字不增損及移次其闕者略者乃於格上或補或詳但邇易見不復標焉覽者能一前後而不失於別行文勢則庶乎免割裂之失矣文句葢多錯文脫字云今不敢改添第科語之有脫則有妨於分會故敢補之分書以別原文
