body:
  text: 大般涅槃經玄義卷下隋天台沙門灌頂撰三約三性為五先明三性有無次光宅下明佛唯二性三開善下明佛唯善性四夫三性下判失五此皆不經屬小宗古來復約三性明涅槃體言佛地一向是善性一向非惡性無記性亦有亦無云云初云無記性亦有亦無者無凡夫無記名亦無有白淨無記名亦有次光宅中光宅云常住佛果有兩種無記一知解無記二果報無記如棋書射御闡提亦有故非是善佛地亦有故非是惡即是無記性也果報者如生死苦無常報既非是惡只是無記涅槃地常樂我淨亦非是善直是無記佛地亦有者有基書工巧等無記開善莊嚴竝言佛無無記唯一善性知解無記有多釋莊嚴云是善性開善云通三性在闡提是惡在佛是善在餘人是無記言果報者生死中多有異具故果報可是無記佛果報何以是無記佛果唯一習果無復報法豈得類此是無記以習善既滿併成習果也夫三性者若有若無只是世俗尚不是真何得用此釋涅槃體五結中此皆數論之極說安處佛體如野人暴背獻至尊耳云如野人者如野老曝背以為妙法欲以此法而獻天子不知天子用此何為二正釋為二先斥非次不能下正釋初二先明名體相稱不可思說今明涅槃體者上來釋名論無無一切方便論絶絶能絶所名下妙理寧可思議次德王下引證斥非德王云大般涅槃非色非聲云何而言可得見聞古來諸師云何以色為涅槃體又經云夫涅槃者不從因生體非是果古來諸師云何以佛果釋涅槃體又涅槃之體無定無果古來諸師云何謂涅槃體定是一法當知其體非色非聲非因非果非一非異非諸聲聞緣覺所知亦非十住能了了見以須是言云何以佛果等者然今師則通因之果為涅槃體不同古人一向在果非一非異者即二而三故非一即三而一故非異即非三非一而三而一故非三乘所知次正釋為三一標列章門次初論下示章所依三淨性下正釋不能默已強作五種言之一約性淨涅槃二約法身德三約一諦四約不生不生五約正性初如文次所依中初論性淨總指一部次論法身指哀歎次論一諦指聖行次論不生指德王次論正性指師子吼迦葉等不可備引斑駁略周耳云一諦指聖行者先作聖行明一實諦迦葉等取陳如品初正觀之文唯正觀性文是三正釋文自為五初性淨章為四初標列次方便淨下正釋二此三下融通四今欲下離總以示別性淨者淨有三種一方便淨二圓淨三性淨初如文次正釋文自為三初方便淨方便淨者嘔和善巧權能逗物住首楞嚴建于大義或一閻浮提或一四天下或一大千界或十方土隨諸衆生應可調伏種種示現無生而生王宮七步無滅而滅倚臥雙林是以晨朝放光大聲遍告正覺世尊將欲涅槃若有所疑今速可問為最後問所以三界躃踊八部悲號獻供填空流血灑地高幢翳諸日月廣蓋遍覆大千如經廣說乃至下者作九法界身非生現生非滅現滅不前不後一時等現然於寂滅無所損減於諸生死無染無纍故名方便淨涅槃也在初釋者由證性淨有此無方勝用故在前釋言漚和善巧者方便淨家般若無生無滅等即方便淨家性淨是則一淨皆具三淨也次圓淨中圓淨者因圓果滿畢竟成就原其初基以大涅槃心行如來行持戒不殺擁護正法廣宣流布利益衆生回向大乘感得金剛堅固之體法身常身圓滿具足獲大涅槃修道得故安住於此祕密藏中復能頒宣廣說一切悉有佛性施與一切常命色力安無閡辨雖破煩惱亦無所破雖圓智慧亦無能圓雖施衆生不得衆生及以施相是名圓淨涅槃也法身常身即圓淨家性淨雖施衆生是圓淨家方便淨三淨性淨中性淨者非修非得非作業非與業本自有之非適今也沖湛寂靜不生不滅雖在波濁波濁不能昏動猶如仰觀虗空月形五翳不能翳雖復隨流苦酢其味真正停留在山雖沒膚中膿血之所不染故名性淨涅槃也云非作業者修行之目名為作業非與業者因成尅果名為與業沖湛寂靜者即性淨家般若雖在波濁者即性淨家解脫三融通中此三涅槃不可相離即三而一不可相混即一而三雖復一三即非一三雖非一三而復一三會之彌分派之彌合橫之彌高竪之彌闊微妙莫測不可思議云會之彌分者性淨自當其體圓淨自當其宗方便淨自當其用三法無監名曰彌分派之彌合者雖三無濫同一法性體無三差故名彌合橫之彌高者一一皆徹實相之底故曰彌高竪之彌闊者一一遍攝法界之法名為彌闊四離總以示別中今欲分別令易解故總唱涅槃即是其名專據性淨以當其體指於圓淨即是其宗方便善巧以為其用作此分別即是其教雖復分別都是一法所謂大乘大般涅槃若得此意無俟多言其未解者更重復說耳云所謂大乘大般涅槃者大乘是圓因涅槃是圓果即一佛性因果也二約法身德為四一標列次法身下正釋三如是下融通四今欲下對五章二約法身德者德有三種一法身德二般若德三解脫德初如文次正釋文自為三初法身中法身者即是金剛堅固之體非色即色非色非非色而名為真善妙色真故非色善故即色妙故非色非非色又真即是空善即是假妙即是中例一切法亦復如是以是義故名為佛法名佛法界攝一切法名法身藏名法身德也云金剛堅固體者此即極果法身受堅固之名又真即空等者三身即三諦故更約三諦釋例一切法者正報既然依報例爾次般若德中般若德者即是無上調御一切種智名大涅槃明淨之鏡此鏡一照一切照照中故是鏡照真故是淨照俗故是明明故則像亮假顯淨故瑕盡真顯鏡故體圓中顯三智一心中得故言明淨鏡攝一切法故稱調御是佛智藏名般若德也云明故則像亮者只由般若明故其像則現故云像亮淨故瑕盡三惑究竟盡方名瑕盡三解脫德中解脫德者即是如來自在解脫其性廣博無縛無脫是廣博義體縛即脫是遠離義調伏衆生是無創疣義如是解脫攝一切法亦名解脫藏亦名解脫德其性廣博者即解脫家法身以解脫是稱體之用故云廣博是遠離義者即解脫家般若以解脫稱般若故三融通中如是三德不可相離文云法身亦非乃至解脫亦非如是三德不可相混文云三點具足無有缺減當知雖一而三雖三而一雖復三一而非三一雖非三一而三而一不可思議攝一切法攝一切人文云我及諸子四部之衆悉皆入中微妙難思為若此先明不離謂即三而一次明不混謂即一而三又云攝一切人者以法在人故四對五章中今欲分別令易解故總唱祕藏以當其名法身攝一切法不縱不橫以當其體般若攝一切法如一面三目以當其宗解脫攝一切法如三點伊以當其用如此敷演即是其教非但經體義明餘義亦顯云云云如此敷演者依開權顯實常住祕藏名體宗用敷演方是醍醐教相餘義亦顯者非但體具五義屬於名具五義皆屬於名宗用各五亦復如是教相具足為顯教相五義互融方成今教故云餘義亦顯三約一諦為四先斥非顯正次有有四下正釋三非離下開顯融通四強欲下對五章三約一諦者世人解諦或境或智或教非無此義今用理釋諦理當即境正境正即智教皆正以理釋諦其義為𠃔初云或境等者境是所照智為能照教為能詮故俱名諦然諸經中非無此義然從理釋諦義易明故不依彼次正釋為二初標章有四種四諦次釋文自為四初生滅為二初正釋次若論下示相指廣一生滅四諦集是能生苦是所生能生生所生所生還生能生苦集回轉生死無已道名能壞滅是所壞所壞亦壞能壞能壞亦壞所壞更互生滅故稱生滅四諦初云道名能壞者道有能壞苦集之功滅從苦集滅處得名故云滅是所壞也又云更互生滅者有苦集時則無道滅有道滅時則無苦集又有道時無滅有道滅時無道故云更互次示相中若論其相逼迫生長能除所除等是也如經逼迫是苦相生長是集相能除是道相所除是滅相二無生中二先釋次示相二無生四諦者推苦集之本本自不生不生故則無苦集既無所壞亦無能壞故稱無生四諦論其相者解苦無苦而有真諦集道滅亦如是如經初云推苦集者能推即是道諦次示相中云解苦無苦者能解即道諦三無量三無量四諦者分別校計苦集滅道有無量相非諸聲聞緣覺所知如經四無作四一實四諦者解苦無苦而有於實乃至解滅無滅而有於實實者非苦非苦因非苦盡非苦對而是一實乃至滅亦如是是名一實四諦具如經竝如文三開顯中非離生滅四諦別有一實四諦即達生滅而是一實四諦無生無量亦復如是一中有無量無量中有一不可思議不可說示云一中有無量者實中有權故無量中一者權中有實故不可思議者即當雙非雙照故云不可思議等四對五章中強欲分別令易解故總唱一實四諦即是名也取一滅諦即是其體故勝鬘云一依者即一滅諦也道諦以當其宗取道諦所治以當其用調御心喜說此真諦即名為教雖差別說只是一無差別法耳云一依者一是所依也心喜說真諦者開小乘之真入佛性之真以心方喜自法華前顯露教中兼帶之說佛意未暢故非永喜此中遺一章闕第四無生一章如德王品中廣說故今不論五約正性為五一標列次正釋三當知下融通四強欲下對五章五若人下結前生後五約正性者性有五種謂正性因性因因性果性果果性初如文次釋中正性者非因非因因非果非果果是名正性因性者十二因緣因因性者十二因緣所生智慧果性者三藐三菩提果果性者大般涅槃今且約一事論之五陰下所以即正因佛性五陰即因性觀五陰生智慧是因因性此智慧增成是果性智慧所滅是果果性於陰既然餘一切法亦爾云且約一事者置十二因緣且約五陰一法身五陰下所以者只此迷陰具於果地正性法身之體名陰下所以五陰即因性者由觀為因性因因性由因成因名曰因因餘一切法者謂十二入十八界依報皆爾三融通中當知五性亦非條別即一而五即五而一一而不混五五而不離一不可思議不可說示云即一者一只是果地一涅槃佛性四對五章中強欲分別令易解故指果果性為名指正性為體指因因性果性為宗指因性為用作此分別五性為教雖復分別只是一法更無差別指果果性為名者大般涅槃即今經名指因性為用者由觀陰成因感果果上通起十界陰用引令入實故指因性為今經用若人能如此解者非但識體於名宗用教觸事冷然為未解者更論宗耳大章第三釋宗為三初略非古次宗者下正釋三總此下對五章第三明涅槃宗者有人言宗體不異是義不然何者若論至理二即不二不二即二此則宜然若論名事不二不可為二二不可為不二既立宗體寧得是同初又二先略非次何者下釋所以於中云此則宜然者隨順機宜云作此說名事者然於果體從名從事而立也次正釋文為二初釋次宗有下明宗義初又二先標立宗意宗者要也修行喉襟莫過因果次此經下正釋又二初正釋次問明下答以顯同初又三先標章次正釋三但此下結歸了旨此經明因略有三種初如文次正釋文自為三初明以圓接通又二初正釋次問答下釋疑初又三先引經示宗相次劣三下釋所以三又云下明開顯絶待人法無二一破無常修常如哀歎品以常樂我斥諸比丘無常苦無我虗僞不真宜應捨離今當為汝說勝三修此是破無常修於常能得常果顯於非常非無常煩惱為薪智慧為火以是因緣成涅槃食令諸弟子悉皆甘嗜初如文次釋中劣三修是煩惱薪勝三修是智慧火非常非無常是涅槃食四衆安住祕密藏中即是甘嗜云是煩惱薪者塵沙無明是薪也又云如來體之是故為常體者履也履而行之法常故佛亦常亦是法非常非無常故佛亦非常非無常也次釋疑為二先問問初為純陀直說一常次明常住二字次斥諸比丘云勝三修何意增減次答云為三先正答破意次昔說下答用二所由三說比丘下答順機得宜答皆是今昔相對昔說四非常總是一無常今論四德總是一常舉總常破總無常耳昔說生死無常而復流動今以常破生死以住破流動故舉二字以破二耳前二如文三得宜中諸比丘置事緣理但修三想今舉勝理破劣理但用三修云云云置事者明觀身不淨是其事觀逐其緣宜故且置之二者以大涅槃不從漸入頓文為四初立行成因次修是下明因成尅果三當知下結判四德王下引證初立行中二者以大涅槃心修從淺至深次第行學如聖行中專行五行初謂戒定慧居家如牢獄梵行若虗空從頭至足其中唯有髮毛爪齒大小腸胃觀察八苦五盛陰等次解苦無苦而有真諦次分別挍計苦集滅道無量無邊次非苦非集非道非滅而有實諦廣說如經居家等戒行也從頭至下定行也觀察下慧行也次尅果中修是行已得二十五三昧住大涅槃況出諸佛功德不復可說云修是行已者得入初住名已當知從淺至深成因克果顯非因非果始終莫不以常為宗四引證中二德王品中亦如是初觀四大如篋五陰如害六塵如賊愛如怨詐煩惱如河八正如筏運手動足截流而去得到彼岸戒定如動足智慧如運手涅槃是彼岸師子吼中亦如是初從少欲知足乃至住大涅槃又善修戒不見戒因戒果戒一戒二等是名善修定慧等亦復如是原始要終皆宗常住以常為宗明矣初別德王證次別師子吼證竝可見第三明獨圓意三者如聖行中云復有一行是如來行所謂大乘大般涅槃大乘即是修因涅槃即是得果大乘為因何所不運大涅槃果何所不克一切無閡人一道出生死莫復過此大略可知不復委說如文三結歸又二初結示開顯分齊次雖三下結歸常宗初文中但此文中處處論行或修十想或知根知欲種種不同不出三種初破無常而修常即是以圓接小接通意也次以大涅槃心修無常次修於常即是從漸入頓次第別意也後即無常而修於常即圓頓人也云以圓接小者此約開名接不同法華前接也又云次第別意者此是涅槃中解圓行漸之人非全同別雖三不同悉以常為因歸宗常果住大涅槃等無有異故文云因雖無常而果是常即第二番意也餘例可知云云問明體一章即識五意明宗亦爾否答例然次明宗義為二初標列宗有三義一宗本二宗要三宗助次正釋中文自為三初宗本宗本者諸行皆以大涅槃心為本本立道生如無綱目不立無皮毛靡附涅槃心為本故其宗得立也如文次宗要中宗要者行之宗要要在於常行會於常能顯非常非無常如七曜之環北辰似萬川之注東海行以常為要亦復如是云北辰者而北辰不動注東海者同一鹹味故以鹹味而喻於常三宗助中宗助者助名氣力也常宗得成賴於資助或人助或教助或行助或道助由助得力故言宗助云或人助者謂善知識或教助者能詮教也或行助者謂修行云助圓行也或道助者修三教道品助顯圓常廣如止觀助道中明總此三宗是釋名專論宗本即體意專明宗要即宗意專明宗助即用意分別此三異餘法門即教意大章第四釋涅槃用為三先標列次解釋三問答下釋論第四釋涅槃用者為三一本用二當用三自在起用初如文次釋自為三初釋本用為三初敘舊次有人下述他難三今當下正釋初敘又二初正敘三師本用者先出舊解靈味小亮云生死之中本有真神之性如弊帛裹黃金像墮在深泥天眼者捉取淨洗開裹黃金像宛然真神佛體萬德咸具而為煩惱所覆若能斷惑佛體自現力士額珠貧女寶藏井中七寶暗室瓶盆等喻亦復如是此皆本有有此功用也新安述小山瑤解云衆生心神不斷正因佛性附此衆生而未具萬德必當有成佛之理取必成之理為本有用也開善莊嚴云正因佛性一法無二理但約本有始有兩時若本有神助有當果之理若能修行金心謝種覺起名為始有始有之理本已有之次引證於中自四引如來性貧女額珠暗室等證本有引師子迦葉明乳中無酪但酪從乳生故言有酪酪非本有必假醪暖種植胡麻答言有油油須搗壓乃可得耳初二如文第三文中又引佛性三世衆生未來當有清淨莊嚴之身此證當有雙取二文意與瑤師不異云雙取二文者只是現有正因佛性當有清淨莊嚴名為雙取四別木石又引木石之流無有成佛之理則非本有之用衆生必應作佛今猶是因因是本有果是始有本有有始有之理即是功用義也可見次難中三初正難三家有人難初義若言衆生身中已有佛果此則因中有果過食中已有糞童女已有兒若已具佛果何故住煩惱中坐不肯出邪何故不放光動地故文云若言有者何故默然正破此執耳次難第二有得佛之理此理若常為相續常為凝然常若相續常何謂本有佛果之理若凝然常則因中有果過同於前難第三家若言本有具始有亦應本有常住復有無常本有只得是常不得無常者本有只本有那得有始有次又若下縱竝又若本有有始有亦應無常有於常無常不得有於常本有那得有始有又本有有始有則了因有生因若了因了本有是常生因生始有是無常不得相有者今本有那得有始有邪三鷸蚌下結失鷸蚌相扼更互是非由來久矣悉如文三正釋今當宣明此義若定執本有當有非三藏通教之宗乃是別圓四門意本有是有門當有是無門雙取是亦有亦無門雙遣是非有非無門別家偏據不融門理兩失為圓家所破何者若執本有之用譬之樹木工匠揆則任曲者梁用直者桁用長者矟用短者箭用本有之用亦復如是佛即破之草木生時無梁箭用工匠所裁因緣獲用若裁曲為直曲無梁用展直為曲直無桁用割長為籌長無矟用折短為薪短無箭用何得苦執本有之用經云三世有法無有是處何得苦執本有當有當本不立勝用安在邪若專難破復失適緣何者理非本非當非亦本當非非本當有四利益或言本有即是常用或言當有即是無常用或亦當亦本即常無常雙用或非當非本即雙非不用之用本有常用攝一切法何得無三門用三門亦攝一切法何得無本有常用文云大般涅槃是諸佛法界即其義也是為圓教赴緣論此四用大獲利益不同舊義云云文為九初明定執成門次本有下示成門相三列家下明偏據之失四佛即下引佛破偏五法云下引經破執六若專下明若苦破者失適宜之益七有四下明稱獲利八本有下明門功能九是為下結益初云今當宣明者只是今當顯示此義耳二當有用為四先敘古次有人下難三今明下正釋四舊論下明照境不同初文自引三師不同二當有用者先出舊解解有三一云理出萬惑之外須除惑都盡乃可見之譬十重紙裹柱雖除九重終不見柱併盡乃見二引漸備經明一切智慧皆漸漸滿不何一期併悟也三云真諦可漸知佛果可頓得何者即俗而真更非遠物所以真可分知佛果超在惑外不即生死故不可漸知初云紙重者紙密可喻無明稠密次師可解三云真諦可漸知者謂漸破俗諦即分分見真諦故云可漸知次難自為三初難漸見有人難初義若理不可漸見惑豈可漸除既不見理由何除惑如文難次師若言理可漸見夫理若是分可作分知理既圓通若為漸解若初見稱後見與後無異不名漸見若初不稱後不名頓見云云云夫理若是分者他作此難亦不全當何者若從初即徹觀真如則全不可分若從或落智增為言則須云分以有四十二位不同故凡釋此義須知有全有分方稱經論大旨難第三師為二先非其旨若言見真者須漸得佛須頓是義不然次別聖言破釋論云若如法觀佛般若與涅槃是三則一相華嚴云虗妄多分別生死涅槃異迷惑聖賢法不識無上道真與涅槃既其不異云何真漸果頓邪於中三先論次經三真與下結失初別論者證初心即頓觀何論至果方名於頓故不可也次引華嚴云若分別生死涅槃異者是迷賢聖法人若云真諦與佛果異過亦同之三正釋又二先重敘失今明諸解更相馳逐水動珠昏然理非遠近見理之智寧得漸頓智若漸頓寧得稱理如方入圓殊不相應次如理下正釋於中又三先明理智冥一體非頓漸如理而解解如於理不見相而見無所得即是得耳此處恐有脫文今敢補曰二有因下示衆生因緣用是漸頓有因緣故亦得漸頓今更補曰三此中下正釋又二初標列二漸漸下釋此中應有四句漸漸漸頓頓漸頓頓初云漸漸者三教因位也漸頓者三教果頭也頓漸者圓教因位也頓者圓佛果也次正釋為五先正釋次後更下於一句更開四句三此一句下餘三句例四四下結廣以斥偏五文云下證用遍法界漸漸尚非漸頓況復頓漸漸頓尚非頓漸況復頓頓法華玄廣說頓漸者無差別中差別耳頓頓者差別中無差別耳三種修三種見明宗中意是也漸頓修漸頓見者是不定觀意也初云三種修等者前宗文中初破無常而修常即是以圓接通次從漸入頓次第別意後即無常而修於常即圓頓人是次文中漸更不同又開四句漸修漸見漸修頓見漸修頓漸見漸修非頓漸見云漸修漸見者且取三教之證人是漸修頓見者得入初住等人是漸修頓漸見者住前為漸見入住名頓見漸修非頓漸見者證頓漸時頓無頓相漸無漸相亦是理體不當頓漸見也見此一句意餘三句亦可解次頓修漸見四句亦爾漸修漸頓見四句亦爾非頓漸修四句亦爾四四十六句不同當知顯體之用甚多那只作一兩種解邪文云王家力士一人當千種種技藝能勝千故一人當千又云譬如大地草木為衆生用我法亦爾當知用同草木比大力士故知用不一也四舊論下照境為四先標不同次問起為解釋之由三彭城不敘不同相四今明下正釋舊論照境之用不同初如文次問中問俗有三世流動萬境去來佛智若為照之若逐境去來則生滅無常若不逐境去來則不與境相稱由此一問七解不同云佛智若為照之者問意云佛為逐去來照邪不逐去來照邪三敘不同相總有七處一一皆先敘次破如文可見冶城嵩云佛智乃無大期死滅猶有念念流動逐境去來此人臨終舌爛口中浪語之過現驗也二藥師解佛智體是常住用是無常逐境去來此解亦違經經云若正見者當說如來定是無為那忽體是無為用是有為三光宅云若無常之智照常住境而不逐境是常今常住之智照無常之境豈應逐境無常此亦不可四明九世中四作九世照境義明此境雖在未來復有當現在當過去義今遂來現在及過去我皆照竟所以不生滅也此亦不可向在未來時猶是當現在未正現在今遂來在現在即作正現在照當知已息豈不生滅邪云今遂來現在者意云剎那心起未來之境現於現在心中名當現在者剎那已息者名未過去故於現在皆悉照之五作逆照中五作逆照義云如來道迎上覺時初一念併逆照萬境從初流來至後成佛併皆照竟後萬境自有去來我都不更新照如天子初登極時併付制法後人犯者隨輕重治不更復制也此亦不可佛智照境何嘗暫息忽言初照後都不照縱令如此終不與境相稱云逆照者只是預照耳六開善中六開善云佛在因日導發初心已能橫照數境竪照數時次入初地一念橫照百法堅照百時二地千法乃至佛地一念橫照萬法竪照萬時如懸鏡高臺此亦不可鏡照先無而後有未免無常之難云百時者取機長短時也七靈味七靈味更借虗空為喻萬物在空空不生滅物自去來此亦不然佛智靈知豈同頑空如文四今明下正釋又三初正釋次又開善下重敘解佛智三今難下破文中今明三藏教中二諦不相即故二智各照所以諸解喧喧若此若通教中二諦相即二智二而不二尚無此諍況復三諦即一諦一諦即三諦三智即一智一智即三智一照即一切照一切照即一照非一非一切不可思議寧復有此微淺問答邪云況復三諦即一諦者照無常時即無常是常亦即非常非無常照常時即常時即常是非常非無常云微淺問答者如前七師問教亦微淺益者亦然次重敘中二先開善次第二下明其次解初又二初明果地智境互冥又開善解佛智照真與真冥無復智境之異智體與真境都復不殊次約位下明約位則有四句差別約位分別凡夫不冥不會因中聖人會而不冥佛果亦冥亦會於中云因中聖人會而不冥者應即破云既會何以不冥邪云云次解又二先明智體異第二解云佛智是靈知真諦是無知二體既殊豈可併有知同無知但會之既極詺之為冥豈得有冥異會次慧印下引證二相慧印三昧經云冥不冥寂不寂肇論亦有用冥體寂之語三今家破於中為三初縱難今難佛之真智既其冥真與真不異佛之俗智亦應冥俗與俗不異佛雖知幻而非幻人次若爾下斥失若爾佛雖知俗不可冥俗佛雖冥真不可同真不應作如此冥真冥俗義三冥真下判失冥真不出二乘冥俗不出凡夫境界云何得是佛智用邪云云三當有起用遍法界三自在起用用遍法界廣不可委文云譬如大地一切草木為衆生用我法亦爾當知勝用無量無邊次開章別釋於中二先標列章次解且約三種一不可思議用二二鳥雙遊用二善惡邪正雙攝用初云二鳥雙遊用者覩無常即始從發心訖年等覺一分無明在亦名無常所以從始至終俱雙遊之稱次解釋文自為三初不可思議為三先標次敘舊三今明下正釋不可思議用者初如文二敘中總有七家一一釋中皆敘彼解次今家非破舊釋有七一云令他見須彌入芥子其實不入唯應度者乃能見之此解不可若不入者何謂神通二解實入但佛神力蹙大令小開小令大此亦不可若爾乃以大容小何謂以小容大三解不知入與不入既是不可思議那可定判入與不入此亦不可佛果上地皆是不可思議盡應不可解餘者盡言可解至此一義獨言不知邪四若有則相妨小大皆空故相容此亦不可若其皆可何所論入亦無大小也前四師竝如文第五師五大中有小性小中有大性以芥子之大性容須彌之小性此亦不可若執定性過同外道又似毗曇又還是大容於小何謂以小容大云大中有小性者有自性色破中云過同外道者同仙人四性計也又似毗曇者毗曇計三世有法也六地論解六地論解大無大相不無無相之大小無小相不無無相之小以無相之小容無相之大無相之大還入無相之小此亦不可大小本是相既言無相那有大小若有大小應是有相若定無相還同空也可見七興皇七興皇云諸法本無大小因緣假名相待假說大為小假說小為大說大為小小是大小說小為大大是小大故得相容此亦不可大不自大待小為大小不自小待大為小此墮他性義自性大小尚不能相容他性大小那得相容云諸本無至因緣假者謂諸法從因緣生雨假無實以假無實故能相入三正釋為三初明不思議事理相即次一性下明不思議周遍三所謂下釋邪正用相今明小不自小亦不由大故小大不自大亦不由小故大因緣故小大亦不離大離小不在內外兩中間亦不常自有不可思議大亦如是通達此理故即事而真唯應度者見不思議須彌之高廣入於不思議芥子之微小是名以不思議之大入於不思議之小住首楞嚴能建大義如經廣說云云初云今明至因緣者謂有大有小皆由因緣雖從因緣即是法性故能相入如止觀第五破遍初廣說一往明不思議用在於道後其理實通乃至善惡邪正等例如是三邪正用為三先明邪正雙用所謂四趣是邪人天為正又三界是邪二乘為正又二乘偏邪菩薩為正云云邪正兩用亦遍法界次四趣下明善惡雙用四趣是惡人天是善又三界悉是惡二乘是善又二乘是惡菩薩為善此用亦遍法界三三界下明無常常雙用三界皆悉無常二乘是三無為常又二乘是無常菩薩是常常無常用亦遍法界其門略義廣也此處必有脫文今敢補曰第二常無常下明二鳥雙遊用常無常雙用者俱亡二邊如鳥喻品中說即是一時雙用也前後倒瀉即是異時偏用宜一時即竝用宜前後即單用不必一種用自在故善惡雙用如迦葉品中說善星至惡尚能攝受令得出家況復善者寧當不攝或雙用或前後云云俱亡二邊者謂二用俱契非常非無常者曰俱亡也第三善惡下明善惡邪正俱攝用三邪正善惡俱攝者陳如品中說邪即外道正即陳如弘廣邪即諸魔正即阿難平等皆攝巧施妙用遊諸世間作大利益若見此意即是自在之用善巧四隨稱機利益住首楞嚴種種示現不動法性其見聞者無不蒙益此義可知不俟多說云云大段第三問答釋疑者問此一章五意云何答例前可解若總論三用即釋名意若專本用即是體意若專當用即是宗意若專自在用即是用意若分別三用即教意初疑云此章為具五章不釋云例亦有之若專本用者理性本有此用若專當用者望本名當即是現在有從因至果之用故對宗也若專自在用者即是果上起用未來永永不窮彌滿法界所以自在之用對今經用大章第五釋教相者然澤明亦敘五時教差別第一時教為小乘解深密云唯為為發趣聲聞乘者說第二時教為大乘解深密云唯為發趣大乘者說第三時教為三乘解深密云普為發趣一切乘者說第四時教為一乘四衢等與一牛車故三乘同歸一佛乘故第五時教名為一性五性同歸一佛性故次明五時教法季月第一時佛成道後六月說也如來二月八日成道八月八日方轉法輪婆沙論等皆云迦栗底迦月白半八日為五比丘轉法輪迦栗底迦月者八月是第二時真諦記云如來成道七年方說般若經說一切法空無自性如來藏經佛成道後十年說也大集十六年說仁王經云前二十九年說摩訶般若三十七年正月八日說仁王般若第三時真諦三藏記云佛成道後三十八年說解節經即解深密是第四時一乘教法華是佛道教三十餘年說第五時此大涅槃經是所說佛性正因得佛常果因最是除果最是遠猶難信故所以後說然引真諦記未可全依若判五時皆據經文自說年數時代以定五時次第若言七年即說般若者猶屬密教般若通前之文如淨名釋菩薩品初所述若云第三時是解深密者彼將般若為第二所以解深密為第三非但今家破此說起信論疏初亦破此說又於五時中皆棄華嚴如法華玄中廣破古人所立五時之義然今略引以示同異不暇破之釋教相為二初標列章第五釋教相者為二一增數二經來緣起次解釋文自二初明增數人又二先列增數者謂一乳二字三修四教五味也次解釋文自為五初文又二先示乳相非一次乳名下解釋所言乳者此名則通外道言教亦稱為乳文云是時舊醫純用乳藥二乘言教亦稱為乳阿含云舍利弗是所生母目連是乳母二人說法生養四衆後文亦云聲聞緣覺佛性如乳菩薩教行亦稱為乳故云手出香色乳施令得飽滿佛教亦稱為乳故目連騰請云譬如犢子其生未久若不得乳必死無疑又云醫占王病定須服乳初云舊醫純用乳藥者純用邪常毒他慧命舍利弗所生者說法回五百人心義當所生目連手擎將還僧得和合義如所養次解釋又二先正釋次問下釋疑初又二先正釋次又外下判初文自四初邪乳中乳名既通若為分別舊醫偷教竊取乳名不解其義而為相續悅意轉動薄皮所誑起四顛倒毒亂心中多所傷害即邪教也云而為相續者計為常也悅意樂也轉動義也薄皮淨也多所傷害者害於二諦三諦真常四德也次二乘乳中二乘乳者佛以方便合三種藥謂鹹苦酢二乘之人用此方便為於四衆治彼邪乳如以楔出楔此以四非常教名為乳也云四非常者只是無常苦空無我不淨四也三菩薩乳中菩薩乳者以大慈大悲隨諸衆生應以何法而得度脫隨而說之或說方便法或說真實法或治邪常或治無常稱彼機緣令得飽滿是名菩薩教乳也云或說真實者十行菩薩雖未親證無作實理而能說之四佛乳佛教乳者究竟真實如經其犢調善不馳不住不處高原亦不下濕不食酒糟麥滑草不與特牛同共一群故其乳多德最為第一正顯涅槃之教是最上乳也如文又外道教如驢乳亨之成糞從其教者墮落三途二乘教如羊鹿乳亨之成酪從其教者升出生死菩薩教如下品牛乳亭之成酥從其教者革凡成聖亦革聖成無上道佛教如上品牛乳從佛教者即得安住祕密藏中當知涅槃教乳最上最妙次釋疑為二先問次答初問者問何故於一乳中多種分別乳只是一何以強作多種分別有何據邪次答為三先示經意通答此經意爾如本有一偈四出證義明無差別差別等例作此說之無咎次有德王下引例又德王中不聞聞不生生等皆作四句今亦例爾三邪名下結酬邪乳名乳乳二乘名乳不乳菩薩名不乳乳佛是非乳非不乳意高例盡子何須惑云邪名乳乳者不徑而酪故名乳乳二乘名乳不乳者乳堪為酪解色即空等菩薩名不乳乳者以能非空出假故佛是雙非者常真法界故意高者乳極在佛故云意高例盡者引德王例四乳義遍何所疑邪二明二字為二先標列二字者世亦二字出世亦二字上上出世亦二字今文亦二字二字既通復須分別次二世下解釋文自為二初文為三初引經示能詮法次文云下釋所以三謝靈下出異解世二字者如瑞應云太子乘羊車詣師學書師教二字謂梵佉婁此二字應詮世間禮樂醫方技藝治政之法故是世間二字也初云梵佉婁者如普曜第三現盡品云菩薩乘羊車將詣書師適入書堂欲見其師名選支見菩薩威神光曜不能堪忍即躃墮地兜術天上有一天子名曰清淨即前牽手令從地起置於座上在大衆爾時菩薩與諸釋僮俱住手執金筆栴檀書衆寶明珠成其書林侍者送之問師選支今師何書而相教乎其師答曰以梵佉留而相教耳天地異書菩薩答曰其書者有六十今師何言正有二種師問其六十四皆何所名乎太子答曰云云又云梵字應如金光明中說出欲論明修梵法歎梵執故是出欲論也佉婁字應是無量勝論明十善法歎釋天報善能攻惡故言勝論總而言之世間二字也謝靈運云梵佉婁是人名其撮諸廣字為略如此間倉雅之類從人立名故言梵佉婁雖復廣略還是世間之二字二出世二字為四初明出世二字相出世二字者嬰兒行云婆和二字所謂有為無為為二字也若出世與出世上上共為二字者即是半滿為二字也衆經同以鹿苑說為半字摩訶衍所說為滿字小大相對共為二字次又諸下敘謬釋又諸師釋此滿字不同地人云涅槃六行俱明是滿字法華是大乘非滿字由是無常此都非義不須論難云云三興皇下明興皇破興皇嘲諸師作五滿半邊滿竪滿𧂐足滿共滿具足滿今不委論云云如下文字亦初說四今明正釋為二先標列今明半滿二字更為五意一直是半二對半滿三帶半滿四廢半滿五開半滿次如塵下正釋又三初正解釋次今之下結歸部旨三又結下重結判如鹿苑無常此直半無滿若方等之流說無常逗小又彈小褒大此正對半明滿若大品通三人共學是帶半明滿若法華正直捨方便是廢半明滿亦有開權顯實即開半明滿若此經斥劣辨勝即廢半明滿一切衆生悉有佛性須跋陀羅得羅漢果即開半明滿而復對破生死流動明於常住二字常破生死住破流動此亦是廢半明滿一切諸法中悉有安樂性又是開半明滿故知二字雖通不可一槩初云對半明滿者於鹿苑得小果者來至方等復有當座得小果者竝聞彈呵以大破小即是大小相對竝明名為對半明滿帶半明滿者傍挾通教二乘小非正意所以名帶須跋等者聞於佛性暫取小證即當開權今之常住二字於諸字中最尊最勝其義可知又結為四句二乘無常是半非滿一乘是滿非半若斥小帶小等是亦半亦滿若世間非半又非滿大意可知云云三明三修為二先標列三三修者有邪三修劣三修勝三修次邪三下解釋為二初正釋次又邪下結判初自為三邪三修謂世間顛倒隨邪師教見相似相續謂為常適意可悅謂為樂轉動運為謂是我愚惑所覆如執掣電如蛾如蠶追求無厭如渴飲鹹唐無毫益亦是厭下粗苦障攀上勝妙出故名邪三修劣三修者依半教破於邪執無常醎味破其執淡無樂苦味破其執甜無我酢味破其執辣三界皆無常諸有悉非樂一切空無我無我所能破欲染色無色染無明掉慢疑如諸迹中象迹為最於諸想中無常為最如經廣說是名劣三修勝三修者依佛勝教破於劣修謂常樂我法身常恆無有變易遊諸覺華歡娛受樂具八自在無能遏絶如是修者入祕密藏名勝三修又邪修是世伊劣修是故伊勝修是新伊大涅槃理即非新非故伊今經即是新伊勝修最尊最上之教也如文四明四教為三初標大意以指廣次三藏下正釋三菩薩下結歸四四教者此該佛一化名相理趣別有疏本云云初云別有疏本者如淨名疏廣玄十卷四門義六卷四悉兩卷三觀二卷應以彼廣以釋今略次釋文自為四初三藏中三藏教者謂戒定慧藏為彼嬰兒梯隥出苦畏憚長遠止息化城即小乘法也菩薩以大涅槃心修即成聖行如經浮囊白骨八苦等觀即其文義也云為彼嬰兒者經中具明四教嬰兒今但出三藏以示小行次云浮囊戒學也白骨定學也八慧學也次通教中通教者三乘共學近遠俱通若能前進亦可得去即摩訶衍法也菩薩以大涅槃心修即成聖行如經解苦無苦而有真諦乃至解道無道而有真諦即其文義也三乘共學近遠者鈍則近通化城利則遠通寶所故云若能前進亦可得去即其人也三別教別教者別在菩薩不與二乘人共所行事理非彼境界即獨菩薩法也若以大涅槃心修即成聖行如經苦有無量相分別校計有無量種非諸聲聞緣覺所知乃至道亦如是即其文義也可解四圓教中圓教者即事而理一教一切教一切教一教非一非一切不可思議隨佛自意是佛境界非諸二乘下地所知如經非苦非諦有實乃至非道非諦有實是名一實諦即其文義也云即事而理者達五陰即常住又達別真俗即常住理故云即也又一教一切教者開一切權教等三結歸為五初結漸圓次復有下結初心即頓三今經下結判四若類下辨異名五若例下例釋菩薩大涅槃心修即是圓心圓心為本行於衆行從淺至深屆極而止如放金剛到際則住當知聖行之一意即是漸頓之教亦名漸圓教此乃文中一種耳初云屆極而止者極在妙覺也復有一行是如來行所謂大乘大般涅槃者即發軫仍頓仍圓一切諸法悉入其中衆流悉鹹無非性海漸圓與頓圓更無別異歷次第門故言漸耳今經乃具二文從勝受名即是圓頓之教於諸教中最為尊上也若類通異名者即是四藏三藏是聲聞藏通是雜藏別是菩薩藏圓是佛藏上能攝下佛藏第一也五例釋中若例四句三藏是聞聞通是聞不聞別是不聞聞圓是不聞不聞乃至生生等例可解云圓是不聞不聞者分段不生是一不聞變易不生是一不聞又智德不生是一不聞斷德不生是一不聞故云不聞不聞五明味為四先明說譬意次若初下釋法譬相生以顯五味之相三夫衆生下結示同體之權智布教五時利物之道四五味下指廣兼對五章初又二先述意五五味者即五種牛味正譬說教次第不應以淺深意取若謂初淺後深是義不然次文云下引證又二初證四味不淺次證醍醐不深文云醫占王病定須服乳又云如得乳麋更無所須無所須者即真解脫真解脫者即大涅槃此豈淺邪文云如水乳雜臥至一月終不成酪若以一滴頗求樹汁投之於中即便成酪衆生佛性亦復如是若本有者何故待緣如此酪譬不可淺也文云譬如甜酥八味具足是大涅槃亦復如是當知此酥其況深矣初云其況深矣者醍醐之酥故不可淺文云阿羅漢辟支佛猶如醍醐如此醍醐不可言深次釋法譬相生為二初非定執若初味定淺後味定深妨文害義次若作下釋自有五文若作次第意釋者則無過咎牛者譬佛大覺朗然圓明成就如血變為乳具足在牛從牛出乳譬佛初說也即寂滅道場從法界體流出法界法教諸菩薩如日初出先照高山故言從牛出乳也次從乳出酪者為小機不堪如聾如啞隱其無量神德示丈六身覆如來藏但說三藏以貧所樂法隨宜方便令章凡成聖故華嚴大後次說三藏之小如從乳後即有於酪也次從酪出生酥者譬三藏之後以大訶小挫其取證敗種壞根無生無用先與後奪如亨酪作生酥也次從生酥出熟酥者譬方等之後委業領財使諸聲聞轉教教菩薩也次從熟酥出醍醐者譬般若已後付財定性與記作佛故文云八千聲聞於法華中得記作佛見如來性如秋收冬藏更無所作無所作者即究竟也竝可解三結示為三初結五時巧畢次今經下明開顯功畢三種種下結歎夫衆生不見佛性智手指撝或作大說或作小說或訶責說或教化說或定天性說衆生若見佛性則靜乎雙樹指撝畢矣息教二河法流竭矣如牛出乳極至醍醐諸佛布教極於見性初云二河者煩惱涅槃二河也今經是最後之說喻彼醍醐一切諸藥悉入其中於橫廣在四味之上歎其竪高故此經處處歎教不可思議只是歎於上妙之乳常住二字最後新伊極圓之教醍醐妙味耳三結歎中種種名目只是一法一法者只是佛師諸菩薩母佛菩薩辨所不能宣凡夫千舌豈解揄揚二乘百盲安能舞手者哉云菩薩母者佛能生諸菩薩故儛者摩也五味義具在法華玄中說又從增一至五總諸說者即釋名意若專五所以是體意若專五所以設諸名相是宗意若專對破是用意若分別其相是教意準前可知不復委釋云云他人云第四釋經時代者撿目録總有一十四品皆是涅槃之枝分也第一後漢桓帝建和年中有月支國沙門支樓迦讖於洛陽譯出一本名般泥洹經兩卷成部第二桓帝元嘉年中有安息國沙門安世高本為太子捨國出家壞道遊方弘化為務振錫來儀屆干洛邑譯出本名小般泥洹一卷成部第三曹魏武帝黃初年中西域沙門安法賢譯一本名大般涅槃經兩卷失其翻處有録可憑第四東吳黃武年中有月支國居士姓支名道謙字恭明初至洛陽後遊江左譯出一本名小般泥洹兩卷成部第五東晉安帝建武年中有迦毗羅國沙門佛陀跋陀此云覺賢初至長安後隱廬山住道場寺譯一本名方等泥洹兩卷成部第六東晉義監六年有晉州沙門法顯往遊西竺還到楊都譯一本名大般涅槃六卷第七西晉武帝太始年中有月支國沙門曇摩剎羅晉云法護初至燉煌次遊京邑後之江左譯出一本名大般泥洹經兩卷第八北凉阻渠蒙遜割據河西都姑臧縣玄始年中有天竺三藏曇無讖唐言法豐六歲出家日誦萬言初學小乘五明諸論後會遇白頭禪師誨以大乘十旬交諍拒而不從謂禪師曰頗有經本可得見否禪師逐授大般涅槃經因而信受三藏妙善呪術時人號為大神呪師初齎涅槃梵本上軼并菩薩戒大集大雲金光明等諸經梵本在夜恐失枕之而臥夜有神人拽讖墮地如是至三空中聲曰此是金剛解脫諸佛祕藏何急枕眠讖藏何忽枕眠讖驚愧謝遂縣梵本掛之高樹果有羣賊夜來盜經盡力共擎竟不能舉晨曉三藏自持而行衆賊同觀謂之為聖愧而悔焉乃至姑臧被河西王阻渠蒙遜殷勤告留請住翻譯大般涅槃梵本即從初十卷至大衆品覺知經少因屈三藏至千闐國求得中分十卷譯至嬰兒行品又覺經少更遣使往于闐國求得餘缺譯之乃足名大般涅槃經四十卷成部第九宋元嘉年中有雍州沙門智猛躬往西城詢求正法齎諸梵夾到西凉州譯出一本名泥洹經二十卷成部第十宋文帝建元年中有天竺沙門求那跋陀羅宋云功德賢於荊州新寺譯一本名泥越經一卷第十一北齊天保元年西國沙門佛陀那舍秦言覺明於相州譯一本名大悲經五卷成部第十二名字功德經并哀歎經與方等泥洹經同本異譯耳第十三隋開皇年中崛多笈多譯出一本名四童子經三卷成部第十四大唐麟德年有南天竺國沙門若天邪跋陀共唐國僧會寧於日南波鄰國譯出兩卷名闍維經儀鳳年初交州都督梁難敵進經入京儀鳳三年大慈恩寺主靈會於東宮進狀請經外傳因許流行至大周天冊萬歲元年奉敕編經入於目録今所講者於前所譯十四中當其第八北凉所譯四十卷成部二經來緣起文為二先標列二經來緣起又二一經緣起二疏緣起次釋文自為二初釋經緣起為二先標列經緣起者有雙卷六卷大本次雙卷者下釋為六初明小緣感次六下明大緣感三又云下辨同異四昔道猛下述天本翻譯時代五初三人下明應驗以顯無緣慈悲解脫之力六經者下指廣雙卷明八十入滅不辨常住蓋小緣所感三藏教也六卷與大本皆明常住俱是大緣所感同座異聞例如大小品耳三同異中又云小本是法顯於天竺鈔初分翻為六卷大本上帙是道猛齎來斯乃廣略二文耳世猶惑焉若是異聞那忽問詞答旨兩本皆同若是鈔者只應存略那忽前後大本則如來說偷狗六卷迦葉問偷狗大本偈說三歸六卷長行說三歸解云問詞答旨所同處少不同處多昔鈔梵文尚無前後秦人翻譯逐意奚互於二義無妨也云道猛齎來者時人咸云大品是曇無讖譯缺此道猛一節文四時代中昔道猛亡身天竺唯齎五品還謂壽命金剛身名字功德如來性大衆問等品到西凉州值沮渠蒙遜割據隴後自號玄始其號三年請曇無羅讖共猛譯五品得二十卷遜恨文義不圓再遣使外國更得八品謂病行聖行梵行嬰兒行德王師子吼迦葉陳如等品又翻二十卷合成四十軸傳於北方玄始五年乃得究訖是時姚萇復號弘始弘始非玄始玄始五年即晉恭帝元熙元年次入宋武劉裕得四年次入宋文帝文帝尚斯典敕道場寺慧觀鳥衣等慧嚴此二高明名蓋淨衆康樂縣令謝靈運抗世逸羣一人而已更共治定開壽命足序純陀哀歎開如來性足四相四依邪正四諦四倒文字鳥喻月喻菩薩凡十二品足前合二十五品製三十六卷則一萬餘偈讖云經義已足其文未盡餘有三品謂付囑燒身分舍利二萬言未來秦地耳小亮云是羅什足品出來關中不聞涅槃恐其言為謬經録稱謝靈運足品相承信用云遜恨文義不圓者如前第八帝中廣說言康樂縣者屬栝州舊有此縣謝公往住此縣令意玩山水唯命人開路路訖官已滿更不至彼五應驗中初三人欲刪略百句解脫俱夢黑神威猛責數剛切汝以凡庸改聖人言義其過大矣若不止者以金剛杵碎之如塵因不敢刪略但去質存華如啼泣面目腫改為戀慕增悲慟如嗚喋我口改為如愛子法故其文璀璨皆此例焉云三人者嚴觀謝公三人也又改王糞問為王隱處改共耶輸為納耶輸改蚊子尿為蚊子水改手扡腳蹈為運手動足如是等文數十餘處後有傳學之人東晉大德沙門道生法師即什公學徒上首時屬晉未宋初傳化江左講諸經論未見涅槃大部懸說衆生悉有佛性時有智勝法師講顯公所譯六卷泥洹經說一闡提定不成佛定宋朝大德盛宗此義聞生所說咸有佛性衆共嗔嫌智與生公數論此義智屢被屈進狀奏聞徹于宋主表云後生小僧全無學識輒事𮌎臆乖越經宗若流傳誤後學者今以表奏請儐入山宋主依奏謫居蘇州唐丘寺時有五十碩學名僧從生入山咨受深要其後有清河沙門慧觀豫州沙門華慧嚴俱什公學徒上首當時在京已逢大經從彼北凉流入咸奏幸得見聞如貧獲寶遂罄衣鉢繕寫此經齎往江東志在傳化宋朝道俗衆共被尋乃云衆生悉有佛性咸歎生公妙釋幽旨善會圓宗即以表陳請生通錫宋主驚歎發使迎生旋至都城披經本略敘疏義五十餘紙其義宏深其文精邃唯釋盤根錯節難解之文於此經大宗開奧藏自後講者稱為關中疏撰既畢衆請宣揚開經之朝宋城道俗五千餘人咸集講會生升座已便令都講偏唱經文四十餘段說一闡提悉有佛性於是便立一切衆生至一闡提有佛性義教令衆論議意無一人申論場者便辭衆曰良以此經大本至道生由斯忍死來久令事得符契言無謬誤不惑衆僧即奉辭願善流布言訖於高座奄從物化時人號生為忍死菩薩矣其有傳集者其數非一如疏所引經者通名也如法華疏說序品第一者亦如彼云云疏緣起中二疏緣起者余以童年給侍攝靜攝靜授大涅槃誦將欲半走雖不敏願聞旨趣給者走也僕也如伍相傳云下走身是遊人即其例也於是負笈天台心欣藍染登山甫爾仍逢出谷不惟菲薄奉從帝庭師既香塗二宮光曜七衆道俗參請門堂交絡雖欽渴甘露如俟河清詎可得乎嘗面請斯典降旨垂許有期無日逮金陵土崩師徒雨散後會匡嶺復屬虔劉爰西向江陵仍遭霧露敕徵師江浦頂疾滯豫章始舉帆南湖已聞東還台嶽秋至佛隴冬逢入滅歎伊余之法障奚可勝言匡嶺在江州廬山豫章即洪州昔五百羣盲七回追佛祇洹一狗聽兩鐘鳴昔五百羣盲者賢愚經第六云一時佛住舍衛國祇樹給狐獨園爾時毗舍離國有五百盲人乞丐自活時聞人言如來出世甚奇甚特其有衆生覩見之者𤸇殘百病皆蒙除愈盲視聾聽啞語僂申拘癖手足狂亂得正貧施衣食愁憂苦厄悉解勉時諸盲人聞此語已還共議言我曹罪積若當遇佛必見救濟便問人言世尊今者為在何國人報之曰在舍衛國聞此語已共於路側早言求哀誰有慈悲愍我等者願見將導到舍衛國至於佛所倩經時無有應者五百人復共議曰空手倩人人無應者今共行乞各今得金錢一枚以用雇人是得達彼各各行乞經于數時人獲一錢凡有五百左右喚人誰將我等到舍衛國金錢五百雇其勞苦時有一人來共相可相可已定以錢與之敕語盲人展轉相牽自在前導將至薩竭國棄諸盲人置於澤中是時盲人不知所在為是何國互相投手經行他田傷破苗穀時有長者值來行田見五百人踐踰苗稼瞋憤怒盛敕與痛手與見求哀具宣上事長者令一使人將詣舍衛適達彼國又聞世尊已復還來得摩竭提國是時使人復還將來向摩竭國時諸盲人欽仰於佛係心欲見肉眼雖閉心眼已觀歡喜發中不覺疲勞已至摩竭復聞世尊已還舍衛如是追逐凡經七反爾時如來觀諸盲人善根已熟敬信能固於舍衛國便住待之使將盲人漸到佛前佛光觸身驚喜無量是時兩目即得關明乃見如來四衆圍繞身色光晃炟如紫金山感戴殊得喜不自勝前詣佛所五體投地為佛作禮異口同音共白佛言唯願垂矜聽在道次時佛告曰善來比丘鬚髮自墮法衣在身重為說法得阿羅漢唯疆唯沈無見無得堰者仆也謂盲唯仆無見唯沈者如犳唯沈無得入山出谷浮墜泝江希聞斯典竟不獲聞日既隱於重崖盲龜眠於海底馮光想木詎可得乎余乃掃墓植樹更伏灰場口誦石偈思愆畢世事不由己迫不得止戴函負封西考闕庭私去公還經途八載日嚴諍論追入咸陽值桃林水奔而夜亡其伴又被讒為巫收往幽薊乘氷濟北馬陷身存臨危履薄生行死地悼栗兢兢寧可盡言昔裹糧千里擔簦於東南負罪三讒驅馳於西北若聽若思二塗俱喪載函者送浮名疏入上都也日嚴諍論說者云造異論咸陽縣名在西京薊古詣反簦長柄笠也情不能已尋諸舊疏將疏勘經不與文會怏怏終日恆若病諸效群盲之觸象學獨夢之談刀以大業十年十月十日廬于天台之南管窺智者義意輒為解釋運丁隋末寇盜縱橫海閙山喧無處紙筆匿影沃洲陰林席箭推度聖文衣殫糧盡虧其次第於是懷挾鄙志託命遂安草本略通放筆仍病縣令鄧氏呼講淨名曳疾應之事不兼舉寄疏他舍他舍被燒廓然蕩盡冥持此本得免灰揚重寄柵城海寇衝突玉石俱罄蕭亮提挾復獲安存所謂焦不能燒賊不能得再蒙靈異重厲微誠更往遂安披尋補削復值軍火食息無寧乃卜安洲安洲者微瀾四繞絶人獸之蹤峰連偉括兼二山之美左臨水鏡澄徹鑒心右帶蕖池紅葩悅目修竹冷風勝白牙團扇萋蒨翠草加戴氏重席雲霞鏤糅於松桂五彩羞其繪圖猿和韻於蟬蛙八音陋其絃管雅有高致豐趣冥倫仍蒔粟拾薪勤兼曉夜暨染筆已來凡歷五載何年不遭軍火何月不見干戈菜食水齎氷牀雪被孤居獨處夢抽思乙詞既野質意不會文其玄義一卷釋文十二卷用紙七百張有崖易逮空海難遍盲寱偏知敢稱圓識特是不負本懷遽茲石火卷舒常住之卷酬報乎身手讚歎解脫之法仰謝於心口粗耘毒草微養藥王螳𧑃螢熠非能抗曜也沃州山名在剡縣遂安山名亦在剡安洲者在台州安縣獸名居筠反說文也熠大白為立反也丁當也乙辰也大般涅槃經玄義卷下大般涅槃玄義抄一卷音釋棋渠之切與碁同闡提梵語具云一闡提此云信不具闡齒善切暴背暴步木切曬也背補昧切脊也駁北角切斑駁不純也嘔和梵語具云漚和俱舍羅此云方便嘔烏候切筏房越切桴也醪郎刀切鷸蚌鷸以律切鳥名蚌部項切蛤也扼乙革切持也桁何庚切屋橫木曰桁矟色角切矛屬詺彌正切辨別物名也楔先結切櫼也櫼音尖羊即切麥也嘲陟交切言相調也撝吁為切揄容朱切齎𤖆西切持也沮渠沮子余切沮渠本胸奴官名以官為氏也萇仲良切喋作答切璀璨璀取猥切璨蒼切璀璨玉光也笈極譁切篋也帆符咸切與帆同怏倚兩切情不滿足也揚余章切風所飛揚也蔳倉甸切草盛貌鏤糅鏤郎豆切彫刻也糅女又切雜糅也俱偏切麞也螳𧑃螳徒郎切螳蜋也𧑃牛刀切謂螳蜋足也螢耀耀戈入切螢耀謂螢火之光也
